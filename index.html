<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聖經史地互動地圖 V1.0.8</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; --base-fs: 14px; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }

        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100%; height: 33.33dvh; flex: none; } 
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        
        .marker { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.5); border-radius: 50%; }
        .marker .label { margin-top: -12.5px; opacity: 0; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; color: var(--brown); transition: opacity 0.4s; pointer-events: none; }
        .marker.highlight .label { opacity: 1 !important; background: #fffde7 !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; }

        /* V1.0.8 手術刀修改：將列表與表格字體鎖死在 14px，實現解耦 */
        #side-panel { background: white; display: flex; flex-direction: column; flex: 0 0 33.33%; overflow: hidden; position: relative; }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; font-size: 14px; line-height: 1.5; }
        #list-container table { font-size: 14px; width: 100%; border-collapse: collapse; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 1.0.7 原始齒輪樣式（保持不變） */
        .fab-container { position: absolute; left: 12px; top: 12px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .fab-main { width: 42px; height: 42px; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border: 2px solid var(--brown); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fab-menu { display: none; flex-direction: column; gap: 6px; }
        .fab-menu button { width: 34px; height: 34px; border-radius: 10px; border: 2px solid var(--brown); background: rgba(255,255,255,0.9); cursor: pointer; font-weight: bold; }
        
        #resizer-main { background: var(--handle-bg); z-index: 1100; width: 12px; cursor: col-resize; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="fab-container">
            <button class="fab-main" onclick="toggleFab()">⚙️</button>
            <div id="fab-menu" class="fab-menu">
                <button onclick="adjustFontSize(1)">A+</button>
                <button onclick="adjustFontSize(-1)">A-</button>
                <button onclick="resetView()">↺</button>
            </div>
        </div>
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    <div id="resizer-main"></div>
    <div id="side-panel">
        <div id="info-body">
            <h3 id="info-title">請選擇事件</h3>
            <div id="info-content"></div>
        </div>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<script>
    let pz, baseMarkerFontSize = 13;

    function toggleFab() { 
        const m = document.getElementById('fab-menu'); 
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; 
    }

    // V1.0.8 解耦核心：只修改內部變數與地圖，不觸控 CSS 變數
    function adjustFontSize(delta) { 
        baseMarkerFontSize = Math.max(8, Math.min(30, baseMarkerFontSize + delta)); 
        // 刪除此處原本的 document.documentElement.style.setProperty 行
        applyMarkerStyles(); 
        if (typeof refreshCollision === "function") refreshCollision(); 
    }

    function applyMarkerStyles() { 
        const s = pz ? pz.getScale() : 1; 
        const anti = 1 / s; 
        document.querySelectorAll('.marker').forEach(m => { 
            const label = m.querySelector('.label');
            const gain = parseInt(m.dataset.size) || 0;
            // 這裡直接用基礎大小計算地標字體
            label.style.fontSize = (baseMarkerFontSize + (gain * 1.5)) + 'px'; 
            m.style.transform = `translate(-50%, -50%) scale(${anti})`; 
        }); 
    }

    function resetView() { pz.reset(); applyMarkerStyles(); }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', applyMarkerStyles);
        // ...其餘 1.0.7 的資料載入邏輯...
    };
</script>
</body>
</html>
