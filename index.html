<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞伯拉罕三代史地互動地圖</title>
    <style>
        :root { --gold: #c5a059; --bg-color: #f5f5f5; --text-dark: #333; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg-color); }
        
        /* 自適應排版 */
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        @media (min-aspect-ratio: 1/1) { #app-container { flex-direction: row; } }

        /* 地圖區 */
        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #e0e0e0; display: flex; justify-content: center; align-items: center; }
        #map-container { position: relative; height: 100%; width: auto; max-width: 100%; aspect-ratio: 9/16; } 
        #bg-map { height: 100%; width: 100%; object-fit: contain; transition: opacity 0.3s; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* 標籤樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; background: rgba(255,255,255,0.85); border: 1px solid #999; color: #555; transition: all 0.3s; white-space: nowrap; }
        .marker.active { background: var(--gold); color: white; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); font-size: 14px; z-index: 100; }
        .marker-area { position: absolute; transform: translate(-50%, -50%); border-radius: 50%; background: rgba(197, 160, 89, 0.3); border: 1px dashed var(--gold); display: flex; justify-content: center; align-items: center; color: #666; font-weight: bold; font-size: 12px; }
        .geofeature { position: absolute; transform: translate(-50%, -50%); font-size: 12px; color: #2c3e50; font-style: italic; opacity: 0.7; }
        .geofeature.sea { color: #2980b9; }

        /* 表格區 */
        #table-section { flex: 1; background: white; overflow-y: auto; border-top: 3px solid var(--gold); }
        @media (min-aspect-ratio: 1/1) { #table-section { border-top: none; border-left: 3px solid var(--gold); } }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--gold); color: white; position: sticky; top: 0; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        tr:hover td { background: #fdfaf1; }
        tr.selected td { background: #fbeeb8; font-weight: bold; }

        /* 資訊框 */
        #info-box { position: absolute; bottom: 20px; right: 20px; width: 300px; max-width: 90vw; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid var(--gold); padding: 15px; z-index: 1000; transition: all 0.3s ease; display: none; }
        #info-box h3 { margin: 0 0 10px 0; color: var(--gold); font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #info-box p { margin: 5px 0; font-size: 13px; color: var(--text-dark); line-height: 1.4; }
        .info-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; margin-left: 5px; }
        
        /* 縮小後的還原按鈕 */
        #restore-btn { position: absolute; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--gold); color: white; border-radius: 50%; display: none; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 1001; font-weight: bold; border: 2px solid white; transition: transform 0.2s; }
        #restore-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="map-container">
            <img src="Abraham_2.png" id="bg-map" alt="地圖">
            <svg id="svg-layer"></svg>
            <div id="marker-layer"></div>
        </div>
        
        <div id="info-box">
            <button class="info-btn" onclick="toggleInfoBox(false)">縮小 ↘</button>
            <h3 id="info-title">事件標題</h3>
            <p><strong>地點：</strong> <span id="info-loc"></span></p>
            <p><strong>時間：</strong> <span id="info-time"></span></p>
            <p><strong>經文：</strong> <span id="info-scripture"></span></p>
            <p><strong>備註：</strong> <span id="info-note"></span></p>
        </div>
        <div id="restore-btn" onclick="toggleInfoBox(true)">資訊</div>
    </div>

    <div id="table-section">
        <table id="data-table">
            <thead><tr><th width="50">序號</th><th>關鍵事件內容</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let eventData = [], coordsData = {}, geoData = [];
    let currentMapType = 'small';
    
    // CSV 解析器
    function parseCSV(text) {
        const rows = [];
        let currentRow = [], currentCell = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i], next = text[i+1];
            if (c === '"' && inQuotes && next === '"') { currentCell += '"'; i++; }
            else if (c === '"') { inQuotes = !inQuotes; }
            else if (c === ',' && !inQuotes) { currentRow.push(currentCell.trim()); currentCell = ''; }
            else if (c === '\n' && !inQuotes) { currentRow.push(currentCell.trim()); rows.push(currentRow); currentRow = []; currentCell = ''; }
            else if (c !== '\r') { currentCell += c; }
        }
        if (currentCell || currentRow.length > 0) { currentRow.push(currentCell.trim()); rows.push(currentRow); }
        return rows;
    }

    async function init() {
        try {
            // 讀取檔案
            const [dataRes, coordRes, geoRes] = await Promise.all([
                fetch('data.csv'), fetch('coords.csv'), fetch('geofeatures.csv')
            ]);
            
            // 處理座標表
            const coordRows = parseCSV(await coordRes.text()).slice(1);
            coordRows.forEach(row => {
                if (row.length < 5) return;
                coordsData[row[0]] = {
                    x_s: row[1], y_s: row[2], x_l: row[3], y_l: row[4],
                    type: row[5] || 'Point', radius: row[6] || 5
                };
            });

            // 處理地貌表
            const geoRows = parseCSV(await geoRes.text()).slice(1);
            geoRows.forEach(row => {
                if (row.length >= 6) geoData.push({ name: row[0], type: row[1], x_s: row[2], y_s: row[3], x_l: row[4], y_l: row[5] });
            });

            // 處理主表
            const dataRows = parseCSV(await dataRes.text()).slice(1);
            const tbody = document.getElementById('table-body');
            
            dataRows.forEach((row, index) => {
                if(row.length < 5 || !row[0]) return;
                const item = { id: row[0], time: row[1], event: row[2], location: row[3], scripture: row[4], note: row[5] || '' };
                eventData.push(item);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.id}</td><td>${item.event}</td>`;
                tr.onclick = () => selectEvent(index, tr);
                tbody.appendChild(tr);
            });

            // 初始渲染地貌 (預設小圖)
            renderMap('small');
        } catch (e) { console.error("資料載入失敗", e); }
    }

    function selectEvent(index, trElement) {
        document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('selected'));
        if(trElement) trElement.classList.add('selected');

        const item = eventData[index];
        const locStr = item.location;
        
        let places = locStr.split('→').map(s => s.replace(/\(.*?\)/g, '').trim());

        let needsLargeMap = false;
        places.forEach(p => {
            if (coordsData[p] && (!coordsData[p].x_s || coordsData[p].x_s === '')) needsLargeMap = true;
        });
        
        const targetMap = needsLargeMap ? 'large' : 'small';
        if (currentMapType !== targetMap) {
            currentMapType = targetMap;
            // 這裡也修正為動態載入 .png
            document.getElementById('bg-map').src = targetMap === 'large' ? 'Abraham_1.png' : 'Abraham_2.png';
        }

        renderMap(currentMapType, places);
        showInfoBox(item);
    }

    function renderMap(mapType, activePlaces = []) {
        const markerLayer = document.getElementById('marker-layer');
        const svgLayer = document.getElementById('svg-layer');
        markerLayer.innerHTML = ''; 
        svgLayer.innerHTML = '';
        
        const xKey = mapType === 'large' ? 'x_l' : 'x_s';
        const yKey = mapType === 'large' ? 'y_l' : 'y_s';

        // 畫地貌
        geoData.forEach(geo => {
            if (geo[xKey] && geo[yKey]) {
                const div = document.createElement('div');
                div.className = `geofeature ${geo.type.toLowerCase()}`;
                div.style.left = geo[xKey] + '%';
                div.style.top = geo[yKey] + '%';
                div.textContent = geo.name;
                markerLayer.appendChild(div);
            }
        });

        // 畫路徑
        if (activePlaces.length === 2) {
            const p1 = coordsData[activePlaces[0]];
            const p2 = coordsData[activePlaces[1]];
            if (p1 && p2 && p1[xKey] && p2[xKey]) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1[xKey] + '%'); line.setAttribute('y1', p1[yKey] + '%');
                line.setAttribute('x2', p2[xKey] + '%'); line.setAttribute('y2', p2[yKey] + '%');
                line.setAttribute('stroke', 'var(--gold)'); line.setAttribute('stroke-width', '2');
                line.setAttribute('stroke-dasharray', '5,5');
                svgLayer.appendChild(line);
            }
        }

        // 畫地點
        for (const name in coordsData) {
            const loc = coordsData[name];
            if (!loc[xKey] || !loc[yKey]) continue; 

            const isActive = activePlaces.includes(name);
            const div = document.createElement('div');
            
            if (loc.type === 'Area') {
                div.className = 'marker-area';
                div.style.width = loc.radius + '%';
                div.style.height = loc.radius + '%'; 
            } else {
                div.className = 'marker';
            }

            if (isActive) div.classList.add('active');
            
            div.style.left = loc[xKey] + '%';
            div.style.top = loc[yKey] + '%';
            div.textContent = name;
            markerLayer.appendChild(div);
        }
    }

    function showInfoBox(item) {
        document.getElementById('info-title').textContent = `${item.id}. ${item.event}`;
        document.getElementById('info-loc').textContent = item.location;
        document.getElementById('info-time').textContent = item.time;
        document.getElementById('info-scripture').textContent = item.scripture;
        document.getElementById('info-note').textContent = item.note;
        toggleInfoBox(true);
    }

    function toggleInfoBox(show) {
        document.getElementById('info-box').style.display = show ? 'block' : 'none';
        document.getElementById('restore-btn').style.display = show ? 'none' : 'flex';
    }

    window.onload = init;
</script>
</body>
</html>
