<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V11.0.0</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; }
        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; }
        .marker { position: absolute; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0;">
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
</div>

<script>

// ===== 新增：sorter CSV 解析 =====
function splitCSVLine(line) {
    const result = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            result.push(cur.trim());
            cur = '';
        } else {
            cur += char;
        }
    }
    result.push(cur.trim());
    return result;
}

let pz, eventData = [], allCoords = [], locFreq = {};

// ===== 修改：loadProject（含 fallback X/Y + freq） =====
async function loadProject(folder) {
    allCoords = [];
    locFreq = {};

    const dRes = await fetch(`${folder}/data.csv`);
    const dText = await dRes.text();

    const cRes = await fetch(`${folder}/coords-1.csv`);
    const text = await cRes.text();

    const lines = text.split(/\r?\n/).filter(l => l.trim());
    const header = splitCSVLine(lines[0]);

    const nIdx = header.indexOf("地名");
    const sIdx = header.indexOf("Size");

    const xIdx = header.indexOf("X") !== -1 ? header.indexOf("X") : 5;
    const yIdx = header.indexOf("Y") !== -1 ? header.indexOf("Y") : 6;

    lines.slice(1).forEach((line, idx) => {
        const cells = splitCSVLine(line);
        const name = (cells[nIdx] || "").replace(/^"|"$/g, '').trim();
        if (!name) return;

        const xVal = parseFloat(cells[xIdx]);
        const yVal = parseFloat(cells[yIdx]);
        if (isNaN(xVal) || isNaN(yVal)) return;

        const freq = dText.split(name).length - 1;
        locFreq[name] = freq;

        allCoords.push({
            n: name,
            x: xVal,
            y: yVal,
            size: parseInt(cells[sIdx]) || 0,
            origIdx: idx
        });
    });

    render(allCoords);
}

// ===== 修改：排序（完全 sorter 邏輯） =====
function render(db) {
    const ml = document.getElementById('marker-layer');
    ml.innerHTML = '';

    const sortedDB = db.map((d, idx) => ({
        ...d,
        isH: false,
        freq: locFreq[d.n] || 0,
        origIdx: idx
    }));

    sortedDB.sort((a, b) => {
        if (a.isH !== b.isH) return a.isH ? -1 : 1;
        if (a.size !== b.size) return a.size - b.size;
        if (a.freq !== b.freq) return b.freq - a.freq;
        return a.origIdx - b.origIdx;
    });

    sortedDB.forEach(data => {
        const m = document.createElement('div');
        m.className = 'marker';
        m.innerText = data.n;
        m.style.left = data.x + '%';
        m.style.top = data.y + '%';
        ml.appendChild(m);
    });
}

window.onload = () => {
    pz = Panzoom(document.getElementById('panzoom-element'));
    loadProject('data');
};

</script>
</body>
</html>
