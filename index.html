<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V8.2</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #ddd; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #000; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }

        /* 地圖區 */
        #map-section { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; }
        /* 關鍵修正：移除 origin 覆寫，讓 Panzoom 使用預設的 50% 50%，恢復正常的邊界偵測 */
        #panzoom-element { display: inline-block; }
        #bg-map { display: block; max-width: none; user-select: none; -webkit-user-drag: none; }
        
        .map-controls { position: absolute; left: 15px; bottom: 30px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .map-controls button { width: 44px; height: 44px; border-radius: 8px; border: 1px solid #999; background: rgba(255,255,255,0.9); font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); cursor: pointer; }

        /* 主拉桿 */
        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; border: 1px solid #bbb; }
        @media (min-width: 801px), (orientation: landscape) { #resizer-main { width: 12px; cursor: col-resize; height: 100%; } #resizer-main::after { content: "⋮"; } }
        @media (max-width: 800px) and (orientation: portrait) { #resizer-main { height: 16px; cursor: row-resize; width: 100%; } #resizer-main::after { content: "⋯"; } }

        /* 側邊欄 */
        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        @media (min-width: 801px), (orientation: landscape) { #side-panel { width: 380px; } }

        /* 資訊區 */
        #info-area { display: none; flex-direction: column; background: #fff; overflow: hidden; min-height: 44px; flex: 0 0 45%; }
        #info-header { 
            background: var(--dark); color: white; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            cursor: pointer;
        }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; font-size: 15px; line-height: 1.6; border-bottom: 1px solid #eee; }
        
        /* 內部拉桿 */
        #resizer-inner { height: 10px; background: #eee; cursor: row-resize; display: flex; align-items: center; justify-content: center; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        #resizer-inner::after { content: "━"; color: #999; font-size: 10px; }

        /* 列表區 */
        #list-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f8f8; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 10; border-bottom: 1px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
        
        /* 標籤 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 3px 7px; border-radius: 10px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.9); border: 1px solid #888; white-space: nowrap; pointer-events: none; visibility: hidden; }
        .marker.highlight { background: var(--gold); color: white; border-color: #fff; z-index: 1000 !important; font-size: 14px; box-shadow: 0 0 10px var(--gold); visibility: visible !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="map-controls">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>

    <div id="resizer-main"></div>

    <div id="side-panel">
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()">
                <div style="font-weight:bold;">📜 事件詳情 <span id="info-arrow">▼</span></div>
                <div style="display:flex; gap:10px;" onclick="event.stopPropagation()">
                    <button onclick="navEvent(-1)" style="padding:4px 10px; cursor:pointer; background:var(--gold); border:none; color:white; border-radius:3px;">◀</button>
                    <button onclick="navEvent(1)" style="padding:4px 10px; cursor:pointer; background:var(--gold); border:none; color:white; border-radius:3px;">▶</button>
                </div>
            </div>
            <div id="info-body">
                <div id="info-time" style="color:#888; font-size:12px;"></div>
                <h3 id="info-title" style="color:var(--gold); margin:5px 0;"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; margin-bottom:10px; font-size:14px; font-weight:bold;"></div>
                <p><strong>經文：</strong><span id="info-script" style="color:#2980b9;"></span></p>
                <div id="info-note" style="border-top:1px solid #eee; padding-top:10px; font-size:14px; color:#555;"></div>
            </div>
        </div>
        <div id="resizer-inner"></div>
        <div id="list-container">
            <table>
                <thead><tr><th width="50">序號</th><th>聖經關鍵事件</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small', currentEventIdx = -1, locationFrequency = {};

    // === 核心防護：動態黑邊守門員 ===
    function updateMinScale() {
        const img = document.getElementById('bg-map');
        const container = document.getElementById('map-section');
        if (!img.offsetWidth || !container.clientWidth) return;
        
        // 精算「剛好填滿容器」所需的最小倍率
        const minW = container.clientWidth / img.offsetWidth;
        const minH = container.clientHeight / img.offsetHeight;
        const absoluteMinScale = Math.max(minW, minH);
        
        // 鎖死 Panzoom 的最小縮放，杜絕使用者按出黑邊
        pz.setOptions({ minScale: absoluteMinScale });
        
        // 如果側邊欄拉動導致地圖區變大，強迫圖片放大以填補可能出現的黑邊
        if (pz.getScale() < absoluteMinScale) {
            pz.zoom(absoluteMinScale, { animate: true });
        }
    }

    // === 完美置中公式 (適配原生 50% Origin) ===
    function flyTo(pts) {
        if (!pts.length) return;
        const img = document.getElementById('bg-map');
        const container = document.getElementById('map-section');
        
        const baseW = img.offsetWidth;
        const baseH = img.offsetHeight;

        let tx = 0, ty = 0;
        pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); });
        const pctX = (tx / pts.length) / 100;
        const pctY = (ty / pts.length) / 100;

        const px = pctX * baseW;
        const py = pctY * baseH;

        const scale = pz.getScale();
        
        // 這是與 Panzoom 內部演算法完全契合的物理對齊公式。
        // 當位移超出邊界時，Panzoom 現在能正確判斷並將圖片停在「極限緊貼黑邊」的位置。
        const targetPanX = (container.clientWidth / 2) - (baseW / 2) - (px - baseW / 2) * scale;
        const targetPanY = (container.clientHeight / 2) - (baseH / 2) - (py - baseH / 2) * scale;

        pz.pan(targetPanX, targetPanY, { animate: true });
    }

    function toggleInfo() {
        const body = document.getElementById('info-body'), arrow = document.getElementById('info-arrow');
        const resizer = document.getElementById('resizer-inner'), area = document.getElementById('info-area');
        if (body.style.display === 'none') {
            body.style.display = 'block'; resizer.style.display = 'flex';
            area.style.flex = "0 0 45%"; arrow.innerText = '▼';
        } else {
            body.style.display = 'none'; resizer.style.display = 'none';
            area.style.flex = "0 0 44px"; arrow.innerText = '▲';
        }
    }

    function initResizers() {
        const rMain = document.getElementById('resizer-main'), side = document.getElementById('side-panel');
        const dragM = (e) => {
            const x = e.clientX || e.touches[0].clientX, y = e.clientY || e.touches[0].clientY;
            if (window.innerHeight > window.innerWidth) side.style.flex = `0 0 ${window.innerHeight - y}px`;
            else side.style.width = `${window.innerWidth - x}px`;
            syncOverlay();
            updateMinScale(); // 確保拉動容器時，防黑邊機制立刻發揮作用
        };
        rMain.onmousedown = () => { window.onmousemove = dragM; window.onmouseup = () => window.onmousemove = null; };
        rMain.ontouchmove = dragM;

        const rInner = document.getElementById('resizer-inner'), area = document.getElementById('info-area');
        const dragI = (e) => {
            const y = e.clientY || e.touches[0].clientY;
            area.style.flex = `0 0 ${Math.max(80, y - area.getBoundingClientRect().top)}px`;
        };
        rInner.onmousedown = () => { window.onmousemove = dragI; window.onmouseup = () => window.onmousemove = null; };
        rInner.ontouchmove = dragI;
    }

    function renderMarkers(db, actives) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        if (actives.length > 1) {
            for (let i = 0; i < actives.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', actives[i].x+'%'); line.setAttribute('y1', actives[i].y+'%');
                line.setAttribute('x2', actives[i+1].x+'%'); line.setAttribute('y2', actives[i+1].y+'%');
                line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3');
                sl.appendChild(line);
            }
        }
        Object.keys(db).forEach(name => {
            const data = db[name];
            if (!name || name === 'undefined' || !data.x || isNaN(data.x) || parseFloat(data.x) === 0) return;
            const isA = actives.some(a => a.n === name);
            const div = document.createElement('div');
            div.className = isA ? 'marker highlight' : 'marker';
            div.style.left = data.x + '%'; div.style.top = data.y + '%';
            div.innerText = name; ml.appendChild(div);
        });
        setTimeout(() => {
            const highlights = Array.from(document.querySelectorAll('.marker.highlight'));
            const normal = Array.from(document.querySelectorAll('.marker:not(.highlight)'));
            const occupied = highlights.map(m => m.getBoundingClientRect());
            normal.sort((a,b) => (locationFrequency[b.innerText]||0) - (locationFrequency[a.innerText]||0)).forEach(m => {
                const r = m.getBoundingClientRect();
                if (occupied.some(o => !(r.right<o.left || r.left>o.right || r.bottom<o.top || r.top>o.bottom))) m.style.display = 'none';
                else { m.style.visibility = 'visible'; occupied.push(r); }
            });
        }, 100);
    }

    async function selectEvent(idx, tr) {
        currentEventIdx = idx;
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        const item = eventData[idx];
        const needLarge = item.loc.split('→').some(p => {
            const n = p.replace(/\(.*?\)/g, '').trim();
            return !!findInDB(n, coordsLarge) && !findInDB(n, coordsSmall);
        });
        
        if (currentMap !== (needLarge ? 'large' : 'small')) {
            currentMap = needLarge ? 'large' : 'small';
            const bgImg = document.getElementById('bg-map');
            bgImg.src = needLarge ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            await new Promise(res => {
                bgImg.onload = () => {
                    syncOverlay();
                    updateMinScale(); // 換圖後，強制重新計算黑邊防護
                    res();
                };
            });
        }
        const db = currentMap === 'large' ? coordsLarge : coordsSmall;
        const actives = item.loc.split('→').map(p => findInDB(p.replace(/\(.*?\)/g, '').trim(), db)).filter(p => p);
        renderMarkers(db, actives);
        if (actives.length) flyTo(actives);
        updateInfoPanel(item);
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        if(!img.offsetWidth) return;
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
        document.getElementById('info-body').scrollTop = 0;
    }

    function findInDB(name, db) {
        if (db[name]) return { ...db[name], n: name };
        for (let key in db) { if (name.includes(key) || key.includes(name)) return { ...db[key], n: key }; }
        return null;
    }

    async function loadData() {
        const t = Date.now();
        const [s, l, d] = await Promise.all([
            fetch(`小圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`大圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`data.csv?t=${t}`).then(r => r.text())
        ]);
        parseCSV(s).forEach(r => { if(r[1]) coordsSmall[r[1].trim()] = {x:r[5], y:r[6]}; });
        parseCSV(l).forEach(r => { if(r[1]) coordsLarge[r[1].trim()] = {x:r[5], y:r[6]}; });
        const rows = parseCSV(d);
        const tbody = document.getElementById('table-body');
        eventData = rows.slice(1).filter(r => r.length > 2).map((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r[0]}</td><td>${r[2]}</td>`;
            tr.onclick = () => { selectEvent(i, tr); tr.scrollIntoView({behavior:'smooth', block:'center'}); };
            tbody.appendChild(tr);
            if (r[3]) r[3].split('→').forEach(n => {
                const name = n.replace(/\(.*?\)/g, '').trim();
                locationFrequency[name] = (locationFrequency[name] || 0) + 1;
            });
            return { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
        });
        syncOverlay();
    }

    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function navEvent(step) {
        const n = currentEventIdx + step;
        if (n >= 0 && n < eventData.length) {
            const rows = document.getElementById('table-body').rows;
            selectEvent(n, rows[n]);
            rows[n].scrollIntoView({behavior:'smooth', block:'center'});
        }
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { 
            maxScale: 8, 
            contain: 'outside' // 保留不露黑邊的基礎設定
        });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        loadData(); initResizers();
        
        // 給渲染一點緩衝時間，確保拿到正確的物理像素來鎖死黑邊
        setTimeout(() => {
            syncOverlay();
            updateMinScale();
        }, 150);
    };

    window.addEventListener('resize', () => {
        document.getElementById('side-panel').style.width = '';
        document.getElementById('side-panel').style.flex = '';
        setTimeout(() => {
            syncOverlay();
            updateMinScale(); // 旋轉螢幕或調整視窗大小時，重新鎖定黑邊防護
        }, 150);
    });
</script>
</body>
</html>
