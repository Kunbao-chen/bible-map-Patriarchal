<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V10.6.1</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; font-family: "微軟正黑體", "ZCOOL KuaiLe", sans-serif; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        
        /* UI 控制鈕 */
        .fab-container { position: absolute; left: 12px; top: 12px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .fab-main { width: 42px; height: 42px; background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); border: 2px solid var(--brown); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fab-main svg { width: 22px; height: 22px; fill: var(--brown); }
        .fab-menu { display: none; flex-direction: column; gap: 6px; }
        .fab-menu.show { display: flex; }
        .fab-item { width: 34px; height: 34px; border-radius: 10px; border: 1.5px solid var(--brown); background: rgba(255,255,255,0.8); font-size: 14px; font-weight: bold; color: var(--brown); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .search-container { position: absolute; right: 12px; top: 12px; z-index: 2000; display: flex; align-items: center; }
        #search-input { width: 0; opacity: 0; transition: all 0.3s; border: 2px solid var(--brown); border-radius: 10px; background: #fff; height: 36px; }
        #search-input.open { width: 150px; opacity: 1; padding: 0 10px; margin-right: 6px; }
        .search-btn { width: 38px; height: 38px; border-radius: 10px; border: 2px solid var(--brown); background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 標籤渲染：區域 vs 城市 */
        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; transition: opacity 0.3s; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.5); border-radius: 50%; margin-bottom: 2px; }
        .marker .label { padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; color: var(--brown); transition: transform 0.2s; }
        
        /* 區域級 (Size > 2) */
        .marker.region-type .dot { display: none; }
        .marker.region-type .label { 
            background: none !important; border: none !important; font-family: 'ZCOOL KuaiLe'; 
            color: var(--ink-blue); text-shadow: 0 0 5px #fdf6e3, 0 0 2px #fdf6e3; letter-spacing: 2px;
        }

        /* 呼吸感高亮效果 */
        .marker.highlight { z-index: 1000 !important; }
        .marker.highlight .label {
            animation: labelBreathe 1.2s infinite alternate ease-in-out;
            background: #fffde7 !important; 
            border: 2px solid #d32f2f !important; 
            color: #d32f2f !important;
            box-shadow: 0 0 12px rgba(211, 47, 47, 0.4);
        }
        @keyframes labelBreathe {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-6px) scale(1.05); }
        }

        /* 面板控制 */
        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; }
        @media (min-width: 801px), (orientation: landscape) { #resizer-main { width: 12px; cursor: col-resize; height: 100%; } #resizer-main::after { content: "⋮"; } }
        @media (max-width: 800px) and (orientation: portrait) { #resizer-main { height: 16px; cursor: row-resize; width: 100%; } #resizer-main::after { content: "⋯"; } }
        
        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; }
        #folder-nav { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; }
        #folder-select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; } /* 修復寬度 */
        
        #info-area { display: none; flex-direction: column; background: #fff; overflow: hidden; flex: 0 0 45%; }
        #info-header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #info-header button { padding: 4px 10px; background: var(--gold); border: none; color: white; cursor: pointer; }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; font-size: 14px; border-bottom: 1px solid #eee; }
        #resizer-inner { height: 10px; background: #eee; cursor: row-resize; display: flex; align-items: center; justify-content: center; }
        #list-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜尋..." oninput="handleSearch()">
            <button class="search-btn" onclick="toggleSearch()"><svg viewBox="0 0 24 24" width="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
        </div>
        <div class="fab-container">
            <button class="fab-main" id="fab-main-btn" onclick="toggleFab()"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>
            <div id="fab-menu" class="fab-menu">
                <button class="fab-item" onclick="pz.zoomIn()">+</button>
                <button class="fab-item" onclick="pz.zoomOut()">-</button>
                <button class="fab-item" onclick="changeMarkerSize(1)">A+</button>
                <button class="fab-item" onclick="changeMarkerSize(-1)">A-</button>
                <button class="fab-item" onclick="resetView()">↺</button>
            </div>
        </div>
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    <div id="resizer-main"></div>
    <div id="side-panel">
        <div id="folder-nav"><select id="folder-select" onchange="loadProject(this.value)"><option value="">載入中...</option></select></div>
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()"><div>📜 詳情 <span id="info-arrow">▼</span></div><div style="display:flex; gap:10px;"><button onclick="navEvent(-1); event.stopPropagation();">◀</button><button onclick="navEvent(1); event.stopPropagation();">▶</button></div></div>
            <div id="info-body">
                <div id="info-time" style="color:#888;"></div>
                <h3 id="info-title" style="color:var(--gold);"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; margin:5px 0; font-weight:bold;"></div>
                <p id="info-script" style="color:#2980b9;"></p>
                <div id="info-note"></div>
            </div>
        </div>
        <div id="resizer-inner"></div>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<script>
    let pz, eventData = [], allCoords = [], locFreq = {};
    let currentFolder = '', currentMapIdx = -1, currentEventIdx = -1, baseMarkerFontSize = 13;

    function toggleSearch() { const i = document.getElementById('search-input'); i.classList.toggle('open'); if(i.classList.contains('open')) i.focus(); }
    function handleSearch() {
        const t = document.getElementById('search-input').value.toLowerCase();
        const filtered = eventData.filter(d => Object.values(d).some(v => String(v).toLowerCase().includes(t)));
        renderTable(filtered);
    }
    function toggleFab() { document.getElementById('fab-menu').classList.toggle('show'); }
    function changeMarkerSize(d) { baseMarkerFontSize = Math.max(8, Math.min(40, baseMarkerFontSize + d)); applyMarkerStyles(); refreshCollision(); }

    async function loadProject(folder) {
        if (!folder) return;
        currentFolder = folder; localStorage.setItem('lastBibleFolder', folder);
        allCoords = []; locFreq = {};
        
        const dRes = await fetch(`${folder}/data.csv?t=${Date.now()}`);
        const rawEvents = parseCSV(await dRes.text()).slice(1).filter(r => r.length > 2);
        eventData = rawEvents.map(r => ({ id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] }));
        renderTable(eventData);

        const fullText = rawEvents.map(r => r.join(" ")).join(" ");
        for (let x = 1; x <= 15; x++) {
            try {
                const cRes = await fetch(`${folder}/coords-${x}.csv?t=${Date.now()}`);
                if (!cRes.ok) break;
                parseCSV(await cRes.text()).slice(1).forEach(r => {
                    if(r[1] && r[5] && r[6]) {
                        const name = r[1].trim();
                        const sz = parseInt(String(r[7]).replace(/[^0-9-]/g, '')) || 0;
                        allCoords.push({ n: name, x: r[5], y: r[6], mapIdx: x, size: sz });
                        if (locFreq[name] === undefined) {
                            const regex = new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                            locFreq[name] = (fullText.match(regex) || []).length;
                        }
                    }
                });
            } catch(e) { break; }
        }
        if(eventData.length > 0) selectEvent(0);
    }

    function parseLocationLogic(locStr, db) {
        const blocks = locStr.split('+').map(b => b.trim());
        const result = { paths: [], points: [] };
        blocks.forEach(block => {
            if (block.includes('→')) {
                const chain = block.split('→').map(p => p.replace(/\(.*?\)/g, '').trim())
                                  .map(name => findBestMatch(name, db)).filter(p => p);
                if (chain.length > 1) result.paths.push(chain);
                chain.forEach(p => result.points.push(p));
            } else {
                const pt = findBestMatch(block.replace(/\(.*?\)/g, '').trim(), db);
                if (pt) result.points.push(pt);
            }
        });
        return result;
    }

    async function selectEvent(idx) {
        currentEventIdx = idx;
        const item = eventData[idx];
        const rows = document.getElementById('table-body').rows;
        Array.from(rows).forEach((r, i) => r.className = i === idx ? 'active-row' : '');
        
        let targetMapIdx = 1;
        const testNames = item.loc.split(/[+→]/).map(p => p.replace(/\(.*?\)/g, '').trim());
        for (let x = 15; x >= 1; x--) {
            const db = allCoords.filter(c => c.mapIdx === x);
            if (db.length && testNames.every(n => findBestMatch(n, db))) { targetMapIdx = x; break; }
        }

        if (currentMapIdx !== targetMapIdx) {
            currentMapIdx = targetMapIdx;
            const img = document.getElementById('bg-map');
            img.src = `${currentFolder}/picture-${targetMapIdx}.png`;
            await new Promise(res => img.onload = () => { syncOverlay(); updateMinScale(); res(); });
        }
        
        const mapData = allCoords.filter(c => c.mapIdx === targetMapIdx);
        const logic = parseLocationLogic(item.loc, mapData);
        renderVisuals(mapData, logic);
        updateInfoPanel(item);
    }

    function renderVisuals(db, logic) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';

        logic.paths.forEach(path => {
            for (let i = 0; i < path.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', path[i].x+'%'); line.setAttribute('y1', path[i].y+'%');
                line.setAttribute('x2', path[i+1].x+'%'); line.setAttribute('y2', path[i+1].y+'%');
                line.setAttribute('stroke', '#d32f2f'); line.setAttribute('stroke-width', '2.5');
                sl.appendChild(line);
            }
        });

        db.forEach(data => {
            const isH = logic.points.some(p => p.n === data.n);
            const m = document.createElement('div');
            m.className = `marker ${isH ? 'highlight' : ''} ${data.size > 2 ? 'region-type' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.dataset.size = data.size; m.dataset.name = data.n;
            m.innerHTML = `<div class="dot"></div><div class="label">${data.n}</div>`;
            ml.appendChild(m);
        });
        
        applyMarkerStyles();
        if (logic.points.length) flyTo(logic.points);
        setTimeout(refreshCollision, 100);
    }

    function refreshCollision() {
        const markers = Array.from(document.querySelectorAll('.marker'));
        markers.sort((a, b) => {
            const aH = a.classList.contains('highlight'), bH = b.classList.contains('highlight');
            if (aH !== bH) return aH ? -1 : 1;
            const aSz = parseInt(a.dataset.size) || 0, bSz = parseInt(b.dataset.size) || 0;
            return aSz - bSz || (locFreq[b.dataset.name] || 0) - (locFreq[a.dataset.name] || 0);
        });

        const occupied = [];
        markers.forEach(m => {
            const label = m.querySelector('.label');
            label.style.opacity = "1";
            const rect = label.getBoundingClientRect();
            const overlap = occupied.some(o => !(rect.right<o.left || rect.left>o.right || rect.bottom<o.top || rect.top>o.bottom));
            if (overlap && !m.classList.contains('highlight')) label.style.opacity = "0";
            else occupied.push(rect);
        });
    }

    function applyMarkerStyles() {
        const s = pz ? pz.getScale() : 1;
        const anti = s > 1 ? 1 / s : 1;
        document.querySelectorAll('.marker').forEach(m => {
            const gain = parseInt(m.dataset.size) || 0;
            const lbl = m.querySelector('.label');
            lbl.style.fontSize = (baseMarkerFontSize + (gain * 1.5)) + 'px';
            m.style.transform = `translate(-50%, -50%) scale(${anti})`;
        });
    }

    function findBestMatch(t, db) {
        let b = null, m = Infinity;
        for (const i of db) {
            if (i.n === t) return i;
            if (i.n.includes(t) || t.includes(i.n)) {
                let d = Math.abs(i.n.length - t.length);
                if (d < m) { m = d; b = i; }
            }
        }
        return b;
    }

    function flyTo(pts) {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        let tx = 0, ty = 0; pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); });
        const px = (tx/pts.length/100)*img.offsetWidth, py = (ty/pts.length/100)*img.offsetHeight;
        const sc = pz.getScale(), ox = img.offsetWidth/2, oy = img.offsetHeight/2;
        pz.pan(((c.clientWidth/2)-ox)/sc - (px-ox), ((c.clientHeight/2)-oy)/sc - (py-oy), { animate: true });
    }

    function updateMinScale() {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        if (!img.offsetWidth) return;
        const min = Math.max(c.clientWidth / img.offsetWidth, c.clientHeight / img.offsetHeight);
        pz.setOptions({ minScale: min });
        if (pz.getScale() < min) pz.zoom(min, { animate: true });
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function initResizers() {
        const rMain = document.getElementById('resizer-main'), side = document.getElementById('side-panel');
        const dragM = (e) => {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if (window.innerWidth < window.innerHeight) { side.style.flex = `0 0 ${window.innerHeight - y}px`; side.style.width = '100%'; }
            else { side.style.width = `${window.innerWidth - x}px`; side.style.flex = 'none'; }
            syncOverlay(); updateMinScale(); refreshCollision();
        };
        rMain.onmousedown = () => { window.onmousemove = dragM; window.onmouseup = () => window.onmousemove = null; };
        rMain.ontouchmove = dragM;
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        data.forEach((item, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td width="40">${item.id}</td><td>${item.event}</td>`;
            tr.onclick = () => selectEvent(i);
            tbody.appendChild(tr);
        });
    }

    function navEvent(step) {
        const n = currentEventIdx + step;
        if (n >= 0 && n < eventData.length) {
            selectEvent(n);
            const targetRow = document.getElementById('table-body').rows[n];
            if(targetRow) targetRow.scrollIntoView({behavior:'smooth', block:'center'});
        }
    }

    function toggleInfo() {
        const body = document.getElementById('info-body'), arrow = document.getElementById('info-arrow'), area = document.getElementById('info-area');
        if (body.style.display === 'none') { body.style.display = 'block'; area.style.flex = "0 0 45%"; arrow.innerText = '▼'; }
        else { body.style.display = 'none'; area.style.flex = "0 0 44px"; arrow.innerText = '▲'; }
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
    }

    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        
        const res = await fetch(`folder.csv?t=${Date.now()}`);
        const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select');
        select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => {
            if(f[0]) {
                const opt = document.createElement('option');
                opt.value = f[0]; opt.innerText = f[1] || f[0];
                select.appendChild(opt);
            }
        });
        const last = localStorage.getItem('lastBibleFolder');
        if (last) { select.value = last; loadProject(last); }
        initResizers();
    };
</script>
</body>
</html>
