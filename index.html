<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞伯拉罕史地互動地圖 V4.6 (修正版)</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg-dark: #2c3e50; --text-light: #ecf0f1; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #222; }
        
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        @media (min-aspect-ratio: 1/1) { #app-container { flex-direction: row; } }

        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #222; cursor: grab; }
        #panzoom-element { position: relative; display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        
        #overlay-container { position: absolute; pointer-events: none; top: 0; left: 0; }
        #svg-layer, #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 標記樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.95); border: 1px solid #777; color: #333; white-space: nowrap; pointer-events: auto; cursor: pointer; z-index: 50; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .marker.active { background: var(--gold); color: white; border: 2px solid white; font-size: 15px; z-index: 100; box-shadow: 0 0 15px rgba(197, 160, 89, 0.8); }
        .marker.low-priority { opacity: 0.85; font-size: 11px; font-weight: normal; }
        .marker-dot-only { padding: 0; width: 10px; height: 10px; border-radius: 50%; background: #888; border: 1px solid white; color: transparent !important; overflow: hidden; z-index: 10; opacity: 0.6; }

        #table-section { flex: 1; background: white; overflow-y: auto; border-top: 5px solid var(--gold); }
        @media (min-aspect-ratio: 1/1) { #table-section { border-top: none; border-left: 5px solid var(--gold); } }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-dark); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 20; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr.selected td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 資訊框 */
        #info-box { position: fixed; top: 20px; right: 20px; width: 300px; background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 6px solid var(--gold); z-index: 999; display: none; flex-direction: column; }
        #info-header { padding: 10px; background: #f4f4f4; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
        #info-body { padding: 15px; max-height: 60vh; overflow-y: auto; }
        .dist-badge { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }

        .controls-map { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .controls-map button { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="controls-map">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>
    <div id="table-section">
        <table id="main-table">
            <thead><tr><th width="50">#</th><th>事件</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="info-box">
    <div id="info-header">
        <span style="font-weight:bold;">📍 事件詳情</span>
        <button onclick="closeInfoBox()" style="border:none; background:none; cursor:pointer; font-size:18px;">✕</button>
    </div>
    <div id="info-body">
        <h3 id="info-title" style="margin:0 0 10px 0; color:var(--gold);"></h3>
        <div id="info-dist-area"></div>
        <p id="info-loc-tags"></p>
        <p><strong>經文：</strong><span id="info-scripture" style="color:#2980b9;"></span></p>
        <p id="info-note" style="font-size:13px; color:#666; line-height:1.5;"></p>
    </div>
</div>

<script>
    let pz, eventData = [], freqMap = {};
    let coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small', currentActivePlaces = [];
    
    const mapImg = document.getElementById('bg-map');
    const overlay = document.getElementById('overlay-container');
    const elem = document.getElementById('panzoom-element');

    // 初始化 Panzoom
    pz = Panzoom(elem, { maxScale: 5, minScale: 0.1, contain: 'outside' });
    document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);

    async function loadData() {
        try {
            const [sRes, lRes, dRes] = await Promise.all([
                fetch('小圖座標.csv'), 
                fetch('大圖座標.csv'), 
                fetch('data.csv')
            ]);
            
            const [sText, lText, dText] = await Promise.all([sRes.text(), lRes.text(), dRes.text()]);

            // 解析座標 - 修正索引：r[5] 是百分比X, r[6] 是百分比Y
            parseCSV(sText).slice(1).forEach(r => {
                if(r[1]) coordsSmall[r[1].trim()] = { x: r[5], y: r[6], type: r[3]||'Point' };
            });

            parseCSV(lText).slice(1).forEach(r => {
                if(r[1]) coordsLarge[r[1].trim()] = { x: r[5], y: r[6], type: r[3]||'Point' };
            });

            // 解析事件資料
            const tbody = document.getElementById('table-body');
            parseCSV(dText).slice(1).forEach((r, i) => {
                if(!r[0]) return;
                // 地點在 index 3
                const locRaw = r[3] || "";
                const locs = locRaw.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
                locs.forEach(p => { if(p) freqMap[p] = (freqMap[p] || 0) + 1; });
                
                eventData.push({ id: r[0], event: r[2], loc: locRaw, script: r[4], note: r[5] });
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r[0]}</td><td>${r[2]}</td>`;
                tr.onclick = () => selectEvent(eventData.length - 1, tr);
                tbody.appendChild(tr);
            });

            // 確保圖片載入後同步尺寸
            if (mapImg.complete) {
                syncOverlaySize();
            } else {
                mapImg.onload = syncOverlaySize;
            }
        } catch (err) {
            console.error("資料載入失敗:", err);
        }
    }

    function syncOverlaySize() {
        overlay.style.width = mapImg.clientWidth + "px";
        overlay.style.height = mapImg.clientHeight + "px";
        renderMarkers(currentMap, []);
    }

    async function changeMapImage(target) {
        if (currentMap === target) return;
        currentMap = target;
        const newSrc = target === 'large' ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
        
        return new Promise(resolve => {
            mapImg.onload = () => {
                syncOverlaySize();
                resolve();
            };
            mapImg.src = newSrc;
        });
    }

    async function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
        
        const item = eventData[idx];
        const places = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
        
        let activePlaces = [], needLarge = false;

        // 判定地圖切換邏輯
        places.forEach(p => {
            if (coordsSmall[p]) {
                activePlaces.push({ ...coordsSmall[p], name: p });
            } else if (coordsLarge[p]) {
                activePlaces.push({ ...coordsLarge[p], name: p });
                needLarge = true; 
            }
        });

        currentActivePlaces = activePlaces;
        await changeMapImage(needLarge ? 'large' : 'small');
        renderMarkers(currentMap, activePlaces);
        flyTo(activePlaces);
        showInfo(item, activePlaces);
    }

    function renderMarkers(type, actives) {
        const markerLayer = document.getElementById('marker-layer');
        const svgLayer = document.getElementById('svg-layer');
        markerLayer.innerHTML = ''; svgLayer.innerHTML = '';
        
        const currentCoords = type === 'large' ? coordsLarge : coordsSmall;
        const activeNames = actives.map(a => a.name);

        // 畫路徑線
        if(actives.length > 1) {
            for(let i=0; i<actives.length-1; i++) {
                const p1 = currentCoords[actives[i].name];
                const p2 = currentCoords[actives[i+1].name];
                if(p1 && p2) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', p1.x+'%'); line.setAttribute('y1', p1.y+'%');
                    line.setAttribute('x2', p2.x+'%'); line.setAttribute('y2', p2.y+'%');
                    line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3'); line.setAttribute('stroke-dasharray', '6,4');
                    svgLayer.appendChild(line);
                }
            }
        }

        // 渲染所有標記
        Object.keys(currentCoords).forEach(name => {
            const loc = currentCoords[name];
            const isActive = activeNames.includes(name);
            const m = document.createElement('div');
            
            m.style.left = loc.x + '%'; 
            m.style.top = loc.y + '%';
            
            if (isActive) {
                m.className = 'marker active';
                m.textContent = name;
                markerLayer.appendChild(m);
            } else if ((freqMap[name] || 0) > 2) { // 頻率高的地點才顯示文字
                m.className = 'marker low-priority';
                m.textContent = name;
                markerLayer.appendChild(m);
            } else {
                m.className = 'marker marker-dot-only';
                m.title = name;
                markerLayer.appendChild(m);
            }
            
            m.onclick = (e) => {
                e.stopPropagation();
                flyTo([{...loc, name}]);
            };
        });
    }

    function flyTo(pts) {
        const currentCoords = currentMap === 'large' ? coordsLarge : coordsSmall;
        let sx=0, sy=0, c=0;
        pts.forEach(p => { 
            const coord = currentCoords[p.name];
            if(coord){ sx+=parseFloat(coord.x); sy+=parseFloat(coord.y); c++; }
        });
        if(!c) return;
        const tx = (sx/c/100)*overlay.offsetWidth, ty = (sy/c/100)*overlay.offsetHeight;
        const sc = pz.getScale();
        pz.pan((elem.parentElement.offsetWidth/2)-(tx*sc), (elem.parentElement.offsetHeight/2)-(ty*sc), {animate:true});
    }

    function showInfo(item, actives) {
        document.getElementById('info-box').style.display = 'flex';
        document.getElementById('info-title').textContent = item.event;
        document.getElementById('info-scripture').textContent = item.script;
        document.getElementById('info-note').textContent = item.note;

        // 顯示公里數 (從地點欄位抓取括號內容)
        const distArea = document.getElementById('info-dist-area');
        const distMatch = item.loc.match(/\(([^)]+)\)/);
        distArea.innerHTML = distMatch ? `<span class="dist-badge">📏 移動距離：${distMatch[1]}</span>` : '';

        const tags = document.getElementById('info-loc-tags');
        tags.innerHTML = '';
        actives.forEach(p => {
            const s = document.createElement('span'); 
            s.textContent = p.name;
            s.style.cssText = "background:#f0f0f0; padding:3px 10px; margin:2px; border-radius:12px; cursor:pointer; display:inline-block; font-size:12px; border:1px solid #ddd;";
            s.onclick = () => flyTo([p]); 
            tags.appendChild(s);
        });
    }

    function closeInfoBox() { document.getElementById('info-box').style.display = 'none'; }
    function resetView() { pz.reset(); if(currentActivePlaces.length) flyTo(currentActivePlaces); }

    function parseCSV(t) {
        let r=[], c=[], cell='', q=false;
        for(let i=0; i<t.length; i++){
            let char=t[i];
            if(char==='"' && t[i+1]==='"'){ cell+='"'; i++; }
            else if(char==='"'){ q=!q; }
            else if(char===',' && !q){ c.push(cell.trim()); cell=''; }
            else if(char==='\n' && !q){ c.push(cell.trim()); r.push(c); c=[]; cell=''; }
            else if(char!=='\r') cell+=char;
        }
        if(cell||c.length) { c.push(cell.trim()); r.push(c); }
        return r;
    }

    window.onload = loadData;
</script>
</body>
</html>
