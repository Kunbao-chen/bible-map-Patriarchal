<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聖經地理萬用框架 V9.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sidebar-width: 350px; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: var(--sidebar-width); display: flex; flex-direction: column; border-right: 1px solid #ccc; background: #f8f9fa; }
        #controls { padding: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        select, input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        #event-list-container { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr:hover { background: #e9ecef; }
        tr.active { background: #d1ecf1; font-weight: bold; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #ddd; }
        #info-panel { position: absolute; bottom: 20px; left: 20px; width: 300px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.2); z-index: 1000; display: none; }
        .nav-btns { display: flex; justify-content: space-between; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="controls">
        <select id="folder-select"><option value="">載入中...</option></select>
        <input type="text" id="search-input" placeholder="🔍 搜尋事件、地點或經文...">
    </div>
    <div id="event-list-container">
        <table id="event-table">
            <thead><tr><th>事件清單</th></tr></thead>
            <tbody id="event-body"></tbody>
        </table>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="info-panel">
        <h3 id="info-title"></h3>
        <p id="info-content"></p>
        <div class="nav-btns">
            <button onclick="navEvent(-1)">◀ 上一個</button>
            <button onclick="navEvent(1)">下一個 ▶</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let map;
    let currentFolder = "";
    let masterData = [];
    let filteredData = [];
    let currentIndex = -1;
    let allCoords = {};
    let currentImageOverlay = null;

    // 初始化地圖與資料夾清單
    async function init() {
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
        map.setView([500, 500], -1); // 給個初始視角避免灰屏

        try {
            const response = await fetch('folder.csv');
            if (!response.ok) throw new Error("找不到 folder.csv");
            const csvText = await response.text();
            
            // 解析資料夾清單 (去除空白行與 BOM)
            const folders = Papa.parse(csvText, { 
                header: true, 
                skipEmptyLines: 'greedy',
                transformHeader: h => h.trim().replace(/^\ufeff/, '') 
            }).data.filter(f => f.folder_name);

            const select = document.getElementById('folder-select');
            select.innerHTML = '';
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.folder_name.trim();
                opt.textContent = f.display_name || f.folder_name;
                select.appendChild(opt);
            });

            const savedFolder = localStorage.getItem('lastBibleFolder');
            if (savedFolder && folders.find(f => f.folder_name.trim() === savedFolder)) {
                select.value = savedFolder;
            }
            
            loadFolder(select.value);

            select.onchange = (e) => {
                localStorage.setItem('lastBibleFolder', e.target.value);
                loadFolder(e.target.value);
            };

            document.getElementById('search-input').oninput = handleSearch;
        } catch (e) { console.error("初始化錯誤:", e); }
    }

    // 讀取子資料夾資料
    async function loadFolder(folder) {
        if (!folder) return;
        currentFolder = folder;
        console.log(`正在載入資料夾: ${folder}`);

        if (currentImageOverlay) map.removeLayer(currentImageOverlay);
        masterData = [];
        allCoords = {};
        currentIndex = -1;
        document.getElementById('info-panel').style.display = 'none';

        try {
            const res = await fetch(`${folder}/data.csv`);
            if (!res.ok) throw new Error(`讀取 ${folder}/data.csv 失敗`);
            const text = await res.text();
            
            const results = Papa.parse(text, { 
                header: true, 
                skipEmptyLines: 'greedy',
                transformHeader: h => h.trim().replace(/^\ufeff/, '') 
            });

            // 智能找尋標題欄位（不分大小寫，對應 Title, Location, Description）
            const keys = Object.keys(results.data[0] || {});
            const tKey = keys.find(k => k.toLowerCase() === 'title');
            const lKey = keys.find(k => k.toLowerCase() === 'location');
            const dKey = keys.find(k => k.toLowerCase() === 'description');

            // 標準化資料結構
            masterData = results.data.map(d => ({
                Title: d[tKey] || "",
                Location: d[lKey] || "",
                Description: d[dKey] || ""
            })).filter(d => d.Title);

            filteredData = [...masterData];

            // 讀取座標檔
            for (let i = 1; i <= 5; i++) {
                const cRes = await fetch(`${folder}/coords_${i}.csv`);
                if (cRes.ok) {
                    const cText = await cRes.text();
                    const cData = Papa.parse(cText, { 
                        header: true, 
                        skipEmptyLines: 'greedy',
                        transformHeader: h => h.trim().replace(/^\ufeff/, '')
                    }).data;
                    // 精準比對：按名字長度由長到短排序
                    allCoords[i] = cData.sort((a, b) => b.Location.length - a.Location.length);
                }
            }
            
            renderTable();
            console.log("資料載入成功，總筆數:", masterData.length);
        } catch (e) { 
            console.error(e);
            alert("載入失敗，請確認檔案路徑與名稱大小寫是否正確！");
        }
    }

    function renderTable() {
        const body = document.getElementById('event-body');
        body.innerHTML = '';
        filteredData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.Title}</td>`;
            tr.onclick = () => selectEvent(index);
            if (index === currentIndex) tr.className = 'active';
            body.appendChild(tr);
        });
    }

    function handleSearch(e) {
        const term = e.target.value.toLowerCase();
        filteredData = masterData.filter(item => 
            item.Title.toLowerCase().includes(term) || 
            item.Location.toLowerCase().includes(term) ||
            item.Description.toLowerCase().includes(term)
        );
        currentIndex = -1;
        renderTable();
    }

    function selectEvent(index) {
        if (index < 0 || index >= filteredData.length) return;
        currentIndex = index;
        const item = filteredData[index];
        renderTable();
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('info-title').textContent = item.Title;
        document.getElementById('info-content').textContent = item.Description;

        // 地圖切換邏輯
        let bestMapId = 1;
        let maxMatches = -1;
        const targetLocations = item.Location.split(/[,，、]/).map(l => l.trim());

        Object.keys(allCoords).forEach(id => {
            let matches = 0;
            targetLocations.forEach(loc => {
                if (allCoords[id].find(c => loc.includes(c.Location))) matches++;
            });
            if (matches > maxMatches) { maxMatches = matches; bestMapId = id; }
        });

        updateMapImage(bestMapId, targetLocations);
    }

    function navEvent(step) {
        let newIndex = currentIndex + step;
        if (newIndex >= 0 && newIndex < filteredData.length) {
            selectEvent(newIndex);
            const trs = document.getElementById('event-body').getElementsByTagName('tr');
            if (trs[newIndex]) trs[newIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    function updateMapImage(mapId, targetLocations) {
        const imgPath = `${currentFolder}/picture_${mapId}.png`;
        const img = new Image();
        img.onload = function() {
            const bounds = [[0, 0], [img.height, img.width]];
            if (currentImageOverlay) map.removeLayer(currentImageOverlay);
            currentImageOverlay = L.imageOverlay(imgPath, bounds).addTo(map);
            
            map.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline) map.removeLayer(l); });
            
            let points = [];
            targetLocations.forEach(loc => {
                const coord = allCoords[mapId]?.find(c => loc.includes(c.Location));
                if (coord) {
                    const pos = [parseFloat(coord.Y), parseFloat(coord.X)];
                    L.marker(pos).addTo(map).bindTooltip(coord.Location, {permanent: true});
                    points.push(pos);
                }
            });

            if (points.length > 0) {
                const featureGroup = L.featureGroup(points.map(p => L.marker(p)));
                map.flyToBounds(featureGroup.getBounds().pad(0.5));
            } else {
                map.fitBounds(bounds);
            }
        };
        img.src = imgPath;
    }

    init();
</script>
</body>
</html>
