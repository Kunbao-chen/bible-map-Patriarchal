<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V10.7.8</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 800px) and (orientation: portrait) { #app-container { flex-direction: column; } #side-panel { width: 100% !important; flex: 0 0 50dvh; } }
        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.5); border-radius: 50%; }
        .marker .label { opacity: 0; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; color: var(--brown); pointer-events: none; }
        .marker.highlight { z-index: 1000 !important; }
        .marker.highlight .label { opacity: 1 !important; background: #fffde7 !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; }
        .search-container { position: absolute; right: 12px; top: 12px; z-index: 2000; }
        #search-input { width: 0; opacity: 0; transition: all 0.4s; border: 2px solid var(--brown); border-radius: 10px; height: 34px; outline: none; }
        #search-input.open { width: 160px; opacity: 1; padding: 0 8px; }
        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; }
        #list-container { flex: 1; overflow-y: auto; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜尋..." oninput="handleSearch()">
            <button onclick="toggleSearch()" style="background:none; border:none; cursor:pointer;">🔍</button>
        </div>
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    <div id="side-panel">
        <select id="folder-select" onchange="loadProject(this.value)" style="width:100%; padding:10px;"><option value="">載入中...</option></select>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = [], currentFolder = '', currentMapIdx = -1, currentEventIdx = -1;

    function toggleSearch() { const i = document.getElementById('search-input'); i.classList.toggle('open'); i.focus(); }

    function handleSearch() {
        const term = document.getElementById('search-input').value.trim().toLowerCase();
        filteredData = term ? eventData.filter(item => item._searchStr.includes(term)) : [...eventData];
        renderTable(filteredData);
        if (filteredData.length > 0) selectEvent(0);
    }

    function selectEvent(idx) {
        currentEventIdx = idx;
        const item = filteredData[idx];
        Array.from(document.getElementById('table-body').rows).forEach((r, i) => r.className = i === idx ? 'active-row' : '');
        updateMapAndInfo(item);
    }

    async function updateMapAndInfo(item) {
        let targetMapIdx = 1;
        const testNames = item.loc.split(/[+→]/).map(p => p.replace(/\(.*?\)/g, '').trim());
        for (let x = 15; x >= 1; x--) {
            const db = allCoords.filter(c => c.mapIdx === x);
            if (db.length && testNames.every(n => findBestMatch(n, db))) { targetMapIdx = x; break; }
        }
        if (currentMapIdx !== targetMapIdx) {
            currentMapIdx = targetMapIdx;
            const img = document.getElementById('bg-map');
            img.src = `${currentFolder}/picture-${targetMapIdx}.png`;
            await new Promise(res => img.onload = () => { syncOverlay(); updateMinScale(); res(); });
        }
        const mapData = allCoords.filter(c => c.mapIdx === targetMapIdx);
        renderVisuals(mapData, parseLocationLogic(item.loc, mapData));
    }

    function flyTo(pts) {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        if (!img.offsetWidth) return;
        
        let tx = 0, ty = 0; pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); });
        const px = (tx/pts.length/100) * img.offsetWidth;
        const py = (ty/pts.length/100) * img.offsetHeight;
        
        const sc = pz.getScale();
        const centerX = img.offsetWidth / 2;
        const centerY = img.offsetHeight / 2;

        // V10.7.8 簡約補償：計算目標點與圖片中心的距離，以此作為 pan 的位移量
        // 這能自動對齊 Panzoom 的 origin: center 邏輯
        const dx = (centerX - px) * sc;
        const dy = (centerY - py) * sc;

        pz.pan(dx, dy, { animate: true });
    }

    function renderVisuals(db, logic) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        sl.innerHTML = ''; ml.innerHTML = '';
        logic.paths.forEach(path => {
            for (let i = 0; i < path.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', path[i].x+'%'); line.setAttribute('y1', path[i].y+'%');
                line.setAttribute('x2', path[i+1].x+'%'); line.setAttribute('y2', path[i+1].y+'%');
                line.setAttribute('stroke', '#d32f2f'); line.setAttribute('stroke-width', '2.5');
                sl.appendChild(line);
            }
        });
        db.forEach(data => {
            const isH = logic.points.some(p => p.n === data.n);
            const m = document.createElement('div');
            m.className = `marker ${isH ? 'highlight' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.innerHTML = `<div class="dot"></div><div class="label">${data.n}</div>`;
            ml.appendChild(m);
        });
        if (logic.points.length) flyTo(logic.points);
    }

    function updateMinScale() {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        const min = Math.max(c.clientWidth / img.offsetWidth, c.clientHeight / img.offsetHeight);
        pz.setOptions({ minScale: min });
        if (pz.getScale() < min) pz.zoom(min);
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    function parseCSV(t) { return t.split('\n').map(row => row.split(',').map(c => c.trim().replace(/^"|"$/g, ''))); }
    function findBestMatch(t, db) { return db.find(i => i.n === t) || db.find(i => i.n.includes(t)) || null; }
    function parseLocationLogic(locStr, db) {
        const res = { paths: [], points: [] };
        locStr.split('+').forEach(b => {
            if (b.includes('→')) {
                const chain = b.split('→').map(p => findBestMatch(p.trim(), db)).filter(p => p);
                if (chain.length > 1) res.paths.push(chain);
                chain.forEach(p => res.points.push(p));
            } else { const pt = findBestMatch(b.trim(), db); if (pt) res.points.push(pt); }
        });
        return res;
    }

    async function loadProject(folder) {
        if (!folder) return; currentFolder = folder; allCoords = [];
        const dRes = await fetch(`${folder}/data.csv`);
        eventData = parseCSV(await dRes.text()).slice(1).filter(r => r.length > 2).map(r => ({ id:r[0], event:r[2], loc:r[3], _searchStr:(r[2]+r[3]).toLowerCase() }));
        filteredData = [...eventData]; renderTable(filteredData);
        for (let x = 1; x <= 15; x++) {
            const cRes = await fetch(`${folder}/coords-${x}.csv`);
            if (!cRes.ok) break;
            parseCSV(await cRes.text()).slice(1).forEach(r => { if(r[1]) allCoords.push({ n:r[1], x:r[5], y:r[6], mapIdx:x }); });
        }
        selectEvent(0);
    }

    function renderTable(data) {
        const tb = document.getElementById('table-body'); tb.innerHTML = '';
        data.forEach((item, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td style="padding:10px;">${item.id}</td><td>${item.event}</td>`;
            tr.onclick = () => selectEvent(i);
            tb.appendChild(tr);
        });
    }

    window.onload = async () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 8, contain: 'outside' });
        const res = await fetch(`folder.csv`);
        const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select');
        folders.forEach(f => { if(f[0]) { const o = document.createElement('option'); o.value = f[0]; o.innerText = f[1] || f[0]; select.appendChild(o); } });
        if (folders[1]) { select.value = folders[1][0]; loadProject(folders[1][0]); }
    };
</script>
</body>
</html>
