<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V11.0.2</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; 
            background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; 
        }
        
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 800px) { #app-container { flex-direction: column; } }

        #map-section { flex: 1; position: relative; background: #e3d5b8; overflow: hidden; cursor: grab; }
        #panzoom-element { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: 0 0; }
        #bg-map { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        #overlay-container { position: absolute; top: 0; left: 0; pointer-events: none; }

        .marker { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: auto; cursor: pointer; transition: opacity 0.2s; }
        .dot { width: 8px; height: 8px; background: #d32f2f; border-radius: 50%; border: 1.5px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .label { 
            margin-top: 4px; padding: 2px 6px; background: rgba(255,255,255,0.9); border-radius: 4px;
            font-size: 14px; color: #333; white-space: nowrap; font-weight: bold;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2); border: 1px solid #ccc;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .marker.highlight .dot { background: #ffeb3b; width: 12px; height: 12px; border: 2px solid #d32f2f; z-index: 100; }
        .marker.highlight .label { background: #d32f2f; color: white; border-color: #d32f2f; font-size: 16px; transform: scale(1.1); z-index: 100; }
        .marker.region-type .label { color: #5d4037; border-style: dashed; }

        #list-section { width: 380px; background: white; border-left: 2px solid var(--gold); display: flex; flex-direction: column; z-index: 20; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        @media (max-width: 800px) { #list-section { width: 100%; height: 40%; border-left: none; border-top: 2px solid var(--gold); } }

        .toolbar { padding: 15px; background: var(--dark); color: white; display: flex; gap: 10px; align-items: center; }
        select, input { padding: 8px; border-radius: 4px; border: none; font-size: 14px; }
        #search-input { flex: 1; display: none; }
        #search-input.open { display: block; }

        #table-container { flex: 1; overflow-y: auto; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { position: sticky; top: 0; background: #f2f2f2; z-index: 5; padding: 10px; border-bottom: 2px solid var(--gold); text-align: left; color: var(--brown); }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; vertical-align: top; }
        tr:hover { background: #fff9eb; }
        tr.active { background: #fff0c1 !important; border-left: 5px solid var(--gold); }
        .row-id { color: #999; font-size: 12px; width: 30px; }
        .row-event { font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
        .row-loc { color: #d32f2f; font-size: 13px; font-weight: bold; }
        .row-script { color: #666; font-style: italic; font-size: 12px; }

        .fab { position: absolute; bottom: 25px; right: 25px; width: 56px; height: 56px; background: var(--gold); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 30; }
        #fab-menu { position: absolute; bottom: 90px; right: 25px; display: none; flex-direction: column; gap: 10px; z-index: 30; }
        .fab-item { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; color: var(--dark); border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="bg.jpg" id="bg-map" onload="syncOverlay()">
            <div id="overlay-container"></div>
        </div>
        <div id="fab-menu">
            <div class="fab-item" title="重置視角" onclick="resetView()">🏠</div>
            <div class="fab-item" title="搜尋" onclick="toggleSearch()">🔍</div>
        </div>
        <div class="fab" onclick="toggleFab()">☰</div>
    </div>

    <div id="list-section">
        <div class="toolbar">
            <select id="folder-select" onchange="loadProject(this.value)"></select>
            <input type="text" id="search-input" placeholder="搜尋事件、地點..." oninput="handleSearch(this.value)">
        </div>
        <div id="table-container">
            <table>
                <thead><tr><th>史地事件錄</th></tr></thead>
                <tbody id="event-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = [], currentFolder = "";
    const logic = { currentIdx: -1, points: [] };

    // --- 保持 11.0.0 的原始解析邏輯 ---
    function parseCSV(text) {
        return text.split('\n').filter(l => l.trim()).map(line => {
            const result = [];
            let cur = '', inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
                else if (char === '\t' && !inQuotes) { result.push(cur.trim()); cur = ''; }
                else cur += char;
            }
            result.push(cur.trim());
            return result;
        });
    }

    async function loadProject(folder) {
        if (!folder) return;
        currentFolder = folder; localStorage.setItem('lastBibleFolder', folder);
        allCoords = [];
        const dRes = await fetch(`${folder}/data.csv?t=${Date.now()}`);
        const dataRawText = await dRes.text(); // 手術刀：用於頻次統計
        
        eventData = parseCSV(dataRawText).slice(1).filter(r => r.length > 2).map(r => {
            const obj = { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
            obj._searchStr = Object.values(obj).join(' ').toLowerCase();
            return obj;
        });
        filteredData = [...eventData];
        renderTable(filteredData);

        let coordIdx = 0;
        for (let x = 1; x <= 15; x++) {
            try {
                const cRes = await fetch(`${folder}/coords-${x}.csv?t=${Date.now()}`);
                if (!cRes.ok) break;
                const rows = parseCSV(await cRes.text());
                if (rows.length < 2) continue;
                
                const h = rows[0];
                const nIdx = h.indexOf("地名") > -1 ? h.indexOf("地名") : 1;
                const sIdx = h.indexOf("Size") > -1 ? h.indexOf("Size") : 7;
                
                rows.slice(1).forEach(r => { 
                    const name = (r[nIdx] || "").replace(/^"|"$/g, '').trim();
                    if(name && r[5]) {
                        // 手術刀：補上 freq 與 origIdx
                        const freq = dataRawText.split(name).length - 1;
                        allCoords.push({ n: name, x: r[5], y: r[6], mapIdx: x, size: parseInt(r[sIdx]) || 0, freq: freq, origIdx: coordIdx++ }); 
                    }
                });
            } catch(e) { break; }
        }
        if(filteredData.length > 0) selectEvent(0);
    }

    function renderTable(data) {
        const body = document.getElementById('event-body');
        body.innerHTML = data.map((r, i) => `
            <tr onclick="selectEvent(${i})" id="row-${i}">
                <td>
                    <div class="row-id">#${r.id}</div>
                    <div class="row-event">${r.event}</div>
                    <div class="row-loc">📍 ${r.loc}</div>
                    <div class="row-script">${r.script}</div>
                </td>
            </tr>
        `).join('');
    }

    function selectEvent(idx) {
        logic.currentIdx = idx;
        const rows = document.querySelectorAll('#event-body tr');
        rows.forEach(r => r.classList.remove('active'));
        const activeRow = document.getElementById(`row-${idx}`);
        if(activeRow) {
            activeRow.classList.add('active');
            activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        const locStr = filteredData[idx].loc;
        logic.points = allCoords.filter(c => locStr.includes(c.n));
        renderVisuals();
        if(logic.points.length > 0) zoomToPoints(logic.points);
    }

    // --- 完全恢復 11.0.0 結構，僅補上 dataset 權重 ---
    function renderVisuals() {
        const ml = document.getElementById('overlay-container');
        const bgMap = document.getElementById('bg-map');
        
        if (logic.points.length > 0) {
            const targetMapIdx = logic.points[0].mapIdx;
            const newSrc = `${currentFolder}/bg${targetMapIdx}.jpg`;
            if (!bgMap.src.includes(`bg${targetMapIdx}.jpg`)) bgMap.src = newSrc;
        }

        allCoords.forEach(data => {
            const isH = logic.points.some(p => p.n === data.n);
            let m = ml.querySelector(`.marker[data-name="${data.n}"]`);
            const currentMapIdx = parseInt(bgMap.src.match(/bg(\d+)\.jpg/)?.[1] || 1);
            if (data.mapIdx !== currentMapIdx) { if (m) m.style.display = 'none'; return; }

            if (!m) {
                m = document.createElement('div'); m.className = 'marker'; m.dataset.name = data.n;
                m.innerHTML = `<div class="dot"></div><div class="label">${data.n}</div>`;
                m.onclick = (e) => { e.stopPropagation(); document.getElementById('search-input').classList.add('open'); handleSearch(data.n); };
                ml.appendChild(m);
            }
            m.style.display = 'flex';
            m.className = `marker ${isH ? 'highlight' : ''} ${data.size > 2 ? 'region-type' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            // 手術刀：寫入排序權重
            m.dataset.size = data.size; m.dataset.freq = data.freq; m.dataset.origIdx = data.origIdx;
        });
        refreshCollision();
    }

    // --- 手術刀：僅替換 sort 排序邏輯 ---
    function refreshCollision() {
        const markers = Array.from(document.querySelectorAll('.marker')).filter(m => m.style.display !== 'none');
        markers.sort((a, b) => {
            const aH = a.classList.contains('highlight'), bH = b.classList.contains('highlight');
            if (aH !== bH) return aH ? -1 : 1;
            const aS = parseInt(a.dataset.size) || 0, bS = parseInt(b.dataset.size) || 0;
            if (aS !== bS) return aS - bS;
            const aF = parseInt(a.dataset.freq) || 0, bF = parseInt(b.dataset.freq) || 0;
            if (aF !== bF) return bF - aF;
            return (parseInt(a.dataset.origIdx) || 0) - (parseInt(b.dataset.origIdx) || 0);
        });
        const occupied = [];
        markers.forEach(m => {
            const label = m.querySelector('.label'); const rect = label.getBoundingClientRect();
            const isOverlap = occupied.some(o => !(rect.right<o.left || rect.left>o.right || rect.bottom<o.top || rect.top>o.bottom));
            if (isOverlap && !m.classList.contains('highlight')) { label.style.opacity = "0"; m.style.pointerEvents = "none"; }
            else { label.style.opacity = "1"; m.style.pointerEvents = "auto"; occupied.push(rect); }
        });
    }

    function applyMarkerStyles() {
        const scale = pz.getScale();
        document.querySelectorAll('.label').forEach(l => { l.style.transform = `scale(${Math.max(0.5, 1/scale)})`; l.style.transformOrigin = "center top"; });
    }

    function zoomToPoints(pts) {
        const xs = pts.map(p => parseFloat(p.x)), ys = pts.map(p => parseFloat(p.y));
        const midX = (Math.min(...xs) + Math.max(...xs)) / 2, midY = (Math.min(...ys) + Math.max(...ys)) / 2;
        const img = document.getElementById('bg-map');
        const px = (midX / 100) * img.offsetWidth, py = (midY / 100) * img.offsetHeight;
        pz.pan(img.offsetWidth/2 - px, img.offsetHeight/2 - py, { animate: true });
        const span = Math.max(Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys));
        pz.zoom(span < 5 ? 4 : (span < 15 ? 2.5 : 1.5), { animate: true });
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    function toggleFab() { const m = document.getElementById('fab-menu'); m.style.display = m.style.display === 'none' ? 'flex' : 'none'; }
    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }
    function toggleSearch() { const i = document.getElementById('search-input'); i.classList.toggle('open'); if(i.classList.contains('open')) i.focus(); }
    
    function handleSearch(val) {
        const q = val.toLowerCase();
        filteredData = eventData.filter(r => r._searchStr.includes(q));
        renderTable(filteredData);
        if(filteredData.length > 0) selectEvent(0);
    }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        const res = await fetch(`folder.csv?t=${Date.now()}`);
        const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select');
        select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => { if(f[0]) { const opt = document.createElement('option'); opt.value = f[0]; opt.innerText = f[1] || f[0]; select.appendChild(opt); } });
        const last = localStorage.getItem('lastBibleFolder');
        if (last) { select.value = last; loadProject(last); }
    };
</script>
</body>
</html>
