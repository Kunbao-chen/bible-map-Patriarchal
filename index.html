<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V8.3 (精準還原版)</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        /* 100% 沿用 8.3 CSS 樣式 */
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #ddd; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #000; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }

        #side-panel { width: 400px; background: #fff; display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        
        /* 僅針對新增的功能做最少量的 UI 置放 */
        .search-controls { background: var(--dark); padding: 10px; border-bottom: 1px solid var(--gold); }
        .search-controls select, .search-controls input { 
            width: 100%; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: none; font-size: 14px; 
        }

        #table-container { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark); color: var(--gold); position: sticky; top: 0; padding: 12px; font-weight: 500; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; cursor: pointer; transition: 0.2s; }
        tr:hover td { background: #f9f9f9; }
        tr.active td { background: rgba(197, 160, 89, 0.15); border-left: 4px solid var(--gold); font-weight: bold; }

        #resizer { width: 12px; background: var(--handle-bg); cursor: col-resize; display: flex; align-items: center; justify-content: center; z-index: 11; }
        
        #map-section { flex-grow: 1; position: relative; overflow: hidden; background: #111; display: flex; justify-content: center; align-items: center; }
        #panzoom-element { position: relative; transform-origin: 0 0; }
        #base-map { display: block; max-width: none; pointer-events: none; }
        #overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        
        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dark); }

        #info-panel { position: absolute; top: 20px; left: 20px; width: 320px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; display: none; border: 1px solid rgba(197, 160, 89, 0.3); }
        #info-title { margin: 0 0 10px 0; color: var(--dark); font-size: 1.2rem; border-bottom: 2px solid var(--gold); padding-bottom: 8px; }
        #info-body { font-size: 0.95rem; line-height: 1.6; color: #333; max-height: 40vh; overflow-y: auto; }
        #close-info { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
        
        .nav-btns { display: flex; gap: 10px; margin-top: 15px; }
        .nav-btn { flex: 1; padding: 8px; border: 1px solid var(--gold); background: #fff; color: var(--gold); border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="side-panel">
        <div class="search-controls">
            <select id="folder-select"></select>
            <input type="text" id="search-input" placeholder="🔍 搜尋事件內容、地點或備註...">
        </div>
        <div id="table-container">
            <table>
                <thead><tr><th width="15%">序</th><th>事件內容</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
    
    <div id="resizer"></div>
    
    <div id="map-section">
        <div id="panzoom-element">
            <img id="base-map" src="">
            <svg id="overlay-svg"></svg>
        </div>
        
        <div id="info-panel">
            <button id="close-info" onclick="document.getElementById('info-panel').style.display='none'">×</button>
            <h3 id="info-title"></h3>
            <div id="info-body"></div>
            <div class="nav-btns">
                <button class="nav-btn" onclick="navEvent(-1)">◀ 上一個</button>
                <button class="nav-btn" onclick="navEvent(1)">下一個 ▶</button>
            </div>
        </div>

        <div id="controls">
            <button class="btn" onclick="pz.zoomIn()">＋</button>
            <button class="btn" onclick="pz.zoomOut()">－</button>
            <button class="btn" onclick="resetView()">↺</button>
        </div>
    </div>
</div>

<script>
    let pz;
    let eventData = [];
    let filteredData = []; // 存放搜尋結果
    let coordData = [];
    let currentEventIdx = -1;
    let minScale = 0.1;

    // 1. 初始化讀取選單
    async function initApp() {
        try {
            const res = await fetch('folder.csv');
            const folders = parseCSV(await res.text(), true);
            const select = document.getElementById('folder-select');
            
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.folder_name;
                opt.textContent = f.display_name || f.folder_name;
                select.appendChild(opt);
            });

            select.addEventListener('change', (e) => loadData(e.target.value));
            document.getElementById('search-input').addEventListener('input', (e) => renderTable(e.target.value));

            if (folders.length > 0) loadData(folders[0].folder_name);
        } catch (e) { console.error("無法載入資料清單", e); }
    }

    // 2. 載入指定資料夾資料 (最小化改動路徑)
    async function loadData(folder) {
        try {
            const r1 = await fetch(`${folder}/data.csv`);
            eventData = parseCSV(await r1.text(), true);
            
            const r2 = await fetch(`${folder}/coords_1.csv`);
            coordData = parseCSV(await r2.text(), true);

            const img = document.getElementById('base-map');
            img.src = `${folder}/picture_1.png`;
            img.onload = () => {
                syncOverlay();
                updateMinScale();
                resetView();
                renderTable('');
            };
        } catch (e) { console.error("資料載入失敗", e); }
    }

    // 3. 關鍵字搜尋優化
    function renderTable(searchTerm) {
        const tb = document.getElementById('table-body');
        tb.innerHTML = '';
        const term = searchTerm.toLowerCase();

        filteredData = eventData.filter(row => {
            const text = `${row['關鍵事件內容']} ${row['地點 (距離)']} ${row['備註 (關聯、釋義、補充)']}`.toLowerCase();
            return text.includes(term);
        });

        filteredData.forEach((row, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row['序號']}</td><td>${row['關鍵事件內容']}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tb.appendChild(tr);
        });
    }

    // 4. 模糊搜尋優化 (地點比對)
    function selectEvent(idx, trRow) {
        currentEventIdx = idx;
        const row = filteredData[idx];
        
        document.querySelectorAll('#table-body tr').forEach(t => t.classList.remove('active'));
        if (trRow) trRow.classList.add('active');

        const info = document.getElementById('info-panel');
        info.style.display = 'block';
        document.getElementById('info-title').textContent = `${row['序號']}. ${row['關鍵事件內容']}`;
        document.getElementById('info-body').innerHTML = `<b>📍 地點：</b>${row['地點 (距離)']}<br><br><b>📖 經文：</b>${row['引用經文']}<br><br><b>💡 備註：</b>${row['備註 (關聯、釋義、補充)'] || ''}`;

        const locs = parseLocations(row['地點 (距離)']);
        let pts = [];
        locs.forEach(l => {
            // 模糊搜尋邏輯：雙向包含
            const match = coordData.find(c => l.includes(c['地名']) || c['地名'].includes(l));
            if (match) pts.push(match);
        });

        drawMarkers(pts);
    }

    // 5. 其餘函式完全還原 8.3 邏輯
    function drawMarkers(pts) {
        const svg = document.getElementById('overlay-svg');
        const img = document.getElementById('base-map');
        svg.innerHTML = '';
        if (pts.length === 0) return;

        const w = img.naturalWidth, h = img.naturalHeight;
        let sumX = 0, sumY = 0;

        pts.forEach(p => {
            const px = (parseFloat(p['百分比X']) / 100) * w;
            const py = (parseFloat(p['百分比Y']) / 100) * h;
            sumX += px; sumY += py;

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', px); c.setAttribute('cy', py); c.setAttribute('r', '6');
            c.setAttribute('fill', 'red'); c.setAttribute('stroke', 'white'); c.setAttribute('stroke-width', '2');
            
            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            t.setAttribute('x', px + 10); t.setAttribute('y', py + 5);
            t.setAttribute('fill', 'white'); t.setAttribute('font-weight', 'bold');
            t.textContent = p['地名'];
            
            g.appendChild(c); g.appendChild(t);
            svg.appendChild(g);
        });

        // 僅移動視角，不自動改變縮放倍率
        const avgX = sumX / pts.length, avgY = sumY / pts.length;
        const container = document.getElementById('map-section');
        const currentScale = pz.getScale();
        pz.pan((container.clientWidth / 2) - (avgX * currentScale), (container.clientHeight / 2) - (avgY * currentScale), { animate: true });
    }

    function parseLocations(str) {
        if (!str) return [];
        return str.replace(/\([^)]*\)/g, '').split(/→|,|，|、/).map(s => s.trim()).filter(s => s);
    }

    function parseCSV(text, hasHeader) {
        let rows = [], row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i], n = text[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        if (hasHeader) {
            const h = rows.shift().map(x => x.replace(/^\ufeff/, ''));
            return rows.map(r => { let o = {}; h.forEach((k, i) => o[k] = r[i]); return o; });
        }
        return rows;
    }

    function navEvent(step) {
        const n = currentEventIdx + step;
        if (n >= 0 && n < filteredData.length) {
            const rowElements = document.getElementById('table-body').rows;
            selectEvent(n, rowElements[n]);
            rowElements[n].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    function syncOverlay() {
        const img = document.getElementById('base-map');
        document.getElementById('overlay-svg').setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
    }

    function updateMinScale() {
        const img = document.getElementById('base-map');
        const container = document.getElementById('map-section');
        minScale = Math.min(container.clientWidth / img.naturalWidth, container.clientHeight / img.naturalHeight) * 0.9;
        pz.setOptions({ minScale: minScale });
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        // 嚴格還原 contain: 'outside'
        pz = Panzoom(document.getElementById('panzoom-element'), { 
            maxScale: 8, 
            contain: 'outside' 
        });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        initApp();
    };
</script>
</body>
</html>
