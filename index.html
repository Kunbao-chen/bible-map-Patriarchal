<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>亞伯拉罕史地互動地圖 V5.2</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg-dark: #2c3e50; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background: #111; }
        
        #app-container { display: flex; width: 100%; height: 100%; }
        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #1a1a1a; cursor: grab; }
        #panzoom-element { position: relative; display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        
        #overlay-container { position: absolute; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; }
        #svg-layer, #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 標記樣式：解決重疊問題 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 4px 10px; border-radius: 15px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.9); border: 1px solid #777; white-space: nowrap; pointer-events: auto; cursor: pointer; z-index: 10; transition: transform 0.2s, box-shadow 0.2s; }
        .marker.active { background: var(--gold); color: white; border: 2px solid #fff; z-index: 9999 !important; box-shadow: 0 0 15px var(--gold); transform: translate(-50%, -50%) scale(1.1); }
        .marker-dot { padding: 0; width: 8px; height: 8px; border-radius: 50%; background: #999; border: 1px solid #fff; color: transparent !important; opacity: 0.5; z-index: 1; }

        #table-section { width: 380px; background: white; overflow-y: auto; border-left: 4px solid var(--gold); z-index: 100; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-dark); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 110; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; line-height: 1.4; }
        tr:hover { background: #f5f5f5; }
        tr.selected td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 資訊框：修復移動與階層 */
        #info-box { position: fixed; top: 30px; left: 30px; width: 340px; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-top: 6px solid var(--gold); z-index: 10000; display: none; flex-direction: column; }
        #info-header { padding: 15px; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 10px 10px 0 0; user-select: none; border-bottom: 1px solid #eee; }
        #info-body { padding: 20px; max-height: 65vh; overflow-y: auto; }
        .path-box { background: #f1f2f6; padding: 12px; border-radius: 6px; border-left: 5px solid #747d8c; margin-bottom: 15px; font-size: 14px; }
        .btn-tool { border: none; background: none; cursor: pointer; font-size: 20px; color: #666; padding: 0 5px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div style="position:absolute; bottom:25px; left:25px; z-index:500; display:flex; flex-direction:column; gap:10px;">
            <button onclick="pz.zoomIn()" style="width:45px; height:45px; border-radius:8px; border:1px solid #ccc; background:white; cursor:pointer; font-size:20px;">+</button>
            <button onclick="pz.zoomOut()" style="width:45px; height:45px; border-radius:8px; border:1px solid #ccc; background:white; cursor:pointer; font-size:20px;">-</button>
            <button onclick="resetV()" style="width:45px; height:45px; border-radius:8px; border:1px solid #ccc; background:white; cursor:pointer; font-size:20px;">↺</button>
        </div>
    </div>
    <div id="table-section">
        <table>
            <thead><tr><th width="55">#</th><th>聖經關鍵事件 (Abraham史地)</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="info-box">
    <div id="info-header">
        <span style="font-weight:bold; color:#333;">📍 事件詳細資訊</span>
        <div><button onclick="toggleMin()" class="btn-tool">－</button><button onclick="closeInfo()" class="btn-tool">×</button></div>
    </div>
    <div id="info-body">
        <div id="info-time" style="color:#888; font-size:12px; margin-bottom:6px;"></div>
        <h3 id="info-title" style="margin:0 0 15px 0; color:var(--gold); line-height:1.3;"></h3>
        <div id="info-path" class="path-box"></div>
        <p><strong>經文參考：</strong><span id="info-script" style="color:#2980b9;"></span></p>
        <div id="info-note" style="font-size:13px; color:#444; line-height:1.7; background:#fafafa; padding:12px; border-radius:5px; border:1px solid #efefef;"></div>
    </div>
</div>

<script>
    let pz, eventData = [], freqMap = {}, coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small';

    // === 資訊框拖動邏輯 (Chrome/Edge 最佳化版) ===
    const infoBox = document.getElementById('info-box');
    const infoHeader = document.getElementById('info-header');
    let isDragging = false, currX, currY, initialX, initialY;

    infoHeader.addEventListener('mousedown', (e) => {
        isDragging = true;
        // 關鍵：清除 right/bottom，改用 left/top 接管，防止定位鎖死
        infoBox.style.right = 'auto'; infoBox.style.bottom = 'auto';
        initialX = e.clientX - infoBox.offsetLeft;
        initialY = e.clientY - infoBox.offsetTop;
        infoHeader.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        currX = e.clientX - initialX;
        currY = e.clientY - initialY;
        infoBox.style.left = currX + 'px';
        infoBox.style.top = currY + 'px';
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        infoHeader.style.cursor = 'move';
    });

    // === 核心解析邏輯 ===
    async function loadData() {
        const t = Date.now();
        try {
            const [s, l, d] = await Promise.all([
                fetch(`小圖座標.csv?t=${t}`).then(r => r.text()),
                fetch(`大圖座標.csv?t=${t}`).then(r => r.text()),
                fetch(`data.csv?t=${t}`).then(r => r.text())
            ]);

            parseCSV(s).forEach(r => { if(r[1]) coordsSmall[r[1].trim()] = {x:r[5], y:r[6]}; });
            parseCSV(l).forEach(r => { if(r[1]) coordsLarge[r[1].trim()] = {x:r[5], y:r[6]}; });

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            // 修正 86 筆問題：更寬鬆的過濾條件
            eventData = parseCSV(d).slice(1).filter(r => r.length >= 3 && (r[0] || r[2])).map((r, i) => {
                const item = { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.id||''}</td><td>${item.event||''}</td>`;
                tr.onclick = () => selectEvent(i, tr);
                tbody.appendChild(tr);
                
                const names = (r[3]||"").replace(/\(.*?\)/g, '').split('→').map(p=>p.trim());
                names.forEach(p => { if(p) freqMap[p] = (freqMap[p]||0)+1; });
                return item;
            });

            const mapImg = document.getElementById('bg-map');
            if(mapImg.complete) syncOverlay(); else mapImg.onload = syncOverlay;
        } catch(e) { console.error("CSV 加載出錯:", e); }
    }

    // 模糊搜尋定位：解決「瑣珥附近山洞」對應到「瑣珥」
    function findCoord(name, db) {
        if(!name) return null;
        const cleanName = name.trim();
        if(db[cleanName]) return { ...db[cleanName], n:cleanName };
        // 模糊匹配：檢查座標庫地名是否包含在事件地名中
        for(let key in db) { if(cleanName.includes(key)) return { ...db[key], n:cleanName }; }
        return null;
    }

    async function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
        const item = eventData[idx];
        const rawLocs = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim()).filter(p=>p);
        
        let needLarge = false;
        rawLocs.forEach(p => { if(!coordsSmall[p] && findCoord(p, coordsLarge)) needLarge = true; });

        if(currentMap !== (needLarge?'large':'small')) {
            currentMap = needLarge?'large':'small';
            document.getElementById('bg-map').src = needLarge ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            await new Promise(res => document.getElementById('bg-map').onload = res);
            syncOverlay();
        }

        const db = currentMap === 'large' ? coordsLarge : coordsSmall;
        const actives = rawLocs.map(p => findCoord(p, db)).filter(p=>p);
        
        renderMarkers(actives);
        if(actives.length) flyTo(actives);
        showInfo(item, actives);
    }

    function renderMarkers(actives) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        const db = currentMap === 'large' ? coordsLarge : coordsSmall;

        if(actives.length > 1) {
            for(let i=0; i<actives.length-1; i++) {
                const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                l.setAttribute('x1', actives[i].x+'%'); l.setAttribute('y1', actives[i].y+'%');
                l.setAttribute('x2', actives[i+1].x+'%'); l.setAttribute('y2', actives[i+1].y+'%');
                l.setAttribute('stroke', '#e74c3c'); l.setAttribute('stroke-width', '3'); l.setAttribute('stroke-dasharray', '6,4');
                sl.appendChild(l);
            }
        }
        Object.keys(db).forEach(name => {
            const isA = actives.some(a => a.n.includes(name) || name.includes(a.n));
            const m = document.createElement('div');
            m.className = isA ? 'marker active' : ((freqMap[name]||0)>2 ? 'marker' : 'marker marker-dot');
            m.style.left = db[name].x+'%'; m.style.top = db[name].y+'%';
            m.innerText = isA ? actives.find(a => a.n.includes(name) || name.includes(a.n)).n : name;
            m.onclick = (e) => { e.stopPropagation(); flyTo([{...db[name], n:name}]); };
            ml.appendChild(m);
        });
    }

    // 核心修復：最強力 CSV 解析器 (處理逗號、引號與斷行)
    function parseCSV(text) {
        const result = [];
        let row = [], cell = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i], next = text[i+1];
            if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(cell.trim()); cell = ''; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (cell || row.length > 0) {
                    row.push(cell.trim()); result.push(row);
                    row = []; cell = '';
                }
                if (char === '\r' && next === '\n') i++;
            } else { cell += char; }
        }
        if (cell || row.length > 0) { row.push(cell.trim()); result.push(row); }
        return result;
    }

    function showInfo(item, actives) {
        infoBox.style.display = 'flex';
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
        const locNames = item.loc.replace(/\(.*?\)/g, '').split('→').map(p=>p.trim());
        const dist = item.loc.match(/\((.*?)\)/);
        document.getElementById('info-path').innerHTML = locNames.length > 1 ? 
            `<b>起點：</b>${locNames[0]}<br><b>終點：</b>${locNames[locNames.length-1]}${dist?`<br><b>距離：</b>${dist[1]}`:''}` : 
            `<b>地點：</b>${locNames[0]}`;
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map');
        const ov = document.getElementById('overlay-container');
        ov.style.width = img.clientWidth + 'px'; ov.style.height = img.clientHeight + 'px';
    }

    function flyTo(pts) {
        let sx=0, sy=0;
        pts.forEach(p => { sx += parseFloat(p.x); sy += parseFloat(p.y); });
        const tx = (sx/pts.length/100)*document.getElementById('bg-map').clientWidth;
        const ty = (sy/pts.length/100)*document.getElementById('bg-map').clientHeight;
        const sc = pz.getScale();
        pz.pan((document.getElementById('map-section').offsetWidth/2)-(tx*sc), (document.getElementById('map-section').offsetHeight/2)-(ty*sc), {animate:true});
    }

    function resetV() { pz.reset(); }
    function closeInfo() { infoBox.style.display = 'none'; }
    function toggleMin() { 
        const b = document.getElementById('info-body');
        b.style.display = b.style.display === 'none' ? 'block' : 'none';
    }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 5, minScale: 0.1, contain: 'outside' });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        loadData();
    };
</script>
</body>
</html>
