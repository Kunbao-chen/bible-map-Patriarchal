<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聖經地理萬用框架 V9.3 - 中文欄位適配版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sidebar-width: 380px; }
        body { margin: 0; display: flex; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; }
        #sidebar { width: var(--sidebar-width); display: flex; flex-direction: column; border-right: 1px solid #ccc; background: white; }
        #controls { padding: 15px; border-bottom: 1px solid #eee; }
        select, input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        #event-list-container { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; font-size: 14px; line-height: 1.4; }
        tr:hover td { background: #f8f9fa; }
        tr.active td { background: #e7f3ff; color: #007bff; font-weight: bold; border-left: 5px solid #007bff; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #e5e5e5; }
        #info-panel { position: absolute; bottom: 25px; left: 25px; width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; display: none; }
        #info-title { margin-top: 0; color: #333; font-size: 18px; }
        #info-content { color: #666; font-size: 14px; line-height: 1.6; }
        .nav-btns { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 8px; cursor: pointer; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
        button:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="controls">
        <select id="folder-select"><option value="">載入中...</option></select>
        <input type="text" id="search-input" placeholder="🔍 搜尋關鍵字或地點...">
    </div>
    <div id="event-list-container">
        <table id="event-table">
            <tbody id="event-body"></tbody>
        </table>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="info-panel">
        <h3 id="info-title"></h3>
        <p id="info-content"></p>
        <div class="nav-btns">
            <button onclick="navEvent(-1)">◀ 上一個</button>
            <button onclick="navEvent(1)">下一個 ▶</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let map;
    let currentFolder = "";
    let masterData = [];
    let filteredData = [];
    let currentIndex = -1;
    let allCoords = {};
    let currentImageOverlay = null;

    // 欄位對應表 (包含英文備份與您的中文欄位)
    const MAPPINGS = {
        title: ['關鍵事件內容', 'Title', '標題'],
        location: ['地點 (距離)', '地點', 'Location', '地名'],
        desc: ['備註 (關聯、釋義、補充)', 'Description', '內容', '備註'],
        x: ['百分比X', 'X', '經度'],
        y: ['百分比Y', 'Y', '緯度']
    };

    function findKey(row, type) {
        const keys = Object.keys(row);
        return MAPPINGS[type].find(m => keys.includes(m)) || keys[0];
    }

    async function init() {
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
        map.setView([500, 500], -1);

        try {
            const response = await fetch('folder.csv');
            const csvText = await response.text();
            const folders = Papa.parse(csvText, { 
                header: true, skipEmptyLines: 'greedy',
                transformHeader: h => h.trim().replace(/^\ufeff/, '') 
            }).data.filter(f => f.folder_name);

            const select = document.getElementById('folder-select');
            select.innerHTML = '';
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.folder_name.trim();
                opt.textContent = f.display_name || f.folder_name;
                select.appendChild(opt);
            });

            const savedFolder = localStorage.getItem('lastBibleFolder');
            if (savedFolder && folders.find(f => f.folder_name.trim() === savedFolder)) {
                select.value = savedFolder;
            }
            
            loadFolder(select.value);
            select.onchange = (e) => {
                localStorage.setItem('lastBibleFolder', e.target.value);
                loadFolder(e.target.value);
            };
            document.getElementById('search-input').oninput = handleSearch;
        } catch (e) { console.error("初始化失敗:", e); }
    }

    async function loadFolder(folder) {
        if (!folder) return;
        currentFolder = folder;
        allCoords = {};
        currentIndex = -1;
        document.getElementById('event-body').innerHTML = '<tr><td>載入資料中...</td></tr>';

        try {
            const res = await fetch(`${folder}/data.csv`);
            const text = await res.text();
            const results = Papa.parse(text, { header: true, skipEmptyLines: 'greedy' });

            if (results.data.length > 0) {
                const tKey = findKey(results.data[0], 'title');
                const lKey = findKey(results.data[0], 'location');
                const dKey = findKey(results.data[0], 'desc');

                masterData = results.data.map(d => ({
                    Title: d[tKey] || "",
                    Location: d[lKey] || "",
                    Description: d[dKey] || ""
                })).filter(d => d.Title);

                filteredData = [...masterData];
                renderTable();

                // 載入座標
                for (let i = 1; i <= 5; i++) {
                    fetch(`${folder}/coords_${i}.csv`).then(async r => {
                        if (r.ok) {
                            const cText = await r.text();
                            const cData = Papa.parse(cText, { header: true, skipEmptyLines: 'greedy' }).data;
                            if (cData.length > 0) {
                                const locKey = findKey(cData[0], 'location');
                                allCoords[i] = cData.sort((a, b) => (b[locKey]?.length || 0) - (a[locKey]?.length || 0));
                            }
                        }
                    });
                }
            }
        } catch (e) { document.getElementById('event-body').innerHTML = '<tr><td>載入失敗</td></tr>'; }
    }

    function renderTable() {
        const body = document.getElementById('event-body');
        body.innerHTML = '';
        filteredData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.Title}</td>`;
            tr.onclick = () => selectEvent(index);
            if (index === currentIndex) tr.className = 'active';
            body.appendChild(tr);
        });
    }

    function handleSearch(e) {
        const term = e.target.value.toLowerCase();
        filteredData = masterData.filter(i => i.Title.includes(term) || i.Location.includes(term));
        renderTable();
    }

    function selectEvent(index) {
        currentIndex = index;
        const item = filteredData[index];
        renderTable();
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('info-title').textContent = item.Title;
        document.getElementById('info-content').textContent = item.Description;

        // 地圖切換邏輯 (尋找匹配地名最多的地圖)
        let bestMapId = 1;
        let maxMatches = -1;
        const locs = item.Location.split(/[→,，、 ]/).map(l => l.trim()).filter(l => l);

        Object.keys(allCoords).forEach(id => {
            let matches = 0;
            const lK = findKey(allCoords[id][0], 'location');
            locs.forEach(l => { if (allCoords[id].find(c => l.includes(c[lK]))) matches++; });
            if (matches > maxMatches) { maxMatches = matches; bestMapId = id; }
        });

        updateMap(bestMapId, locs);
    }

    function navEvent(step) {
        let n = currentIndex + step;
        if (n >= 0 && n < filteredData.length) selectEvent(n);
    }

    function updateMap(mapId, locs) {
        const path = `${currentFolder}/picture_${mapId}.png`;
        const img = new Image();
        img.onload = function() {
            const bounds = [[0, 0], [img.height, img.width]];
            if (currentImageOverlay) map.removeLayer(currentImageOverlay);
            currentImageOverlay = L.imageOverlay(path, bounds).addTo(map);
            
            map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
            
            let pts = [];
            const lK = findKey(allCoords[mapId][0], 'location');
            const xK = findKey(allCoords[mapId][0], 'x');
            const yK = findKey(allCoords[mapId][0], 'y');

            locs.forEach(l => {
                const c = allCoords[mapId]?.find(coord => l.includes(coord[lK]));
                if (c) {
                    const p = [parseFloat(c[yK]), parseFloat(c[xK])];
                    L.marker(p).addTo(map).bindTooltip(c[lK], {permanent: true});
                    pts.push(p);
                }
            });

            if (pts.length > 0) map.flyToBounds(L.featureGroup(pts.map(p => L.marker(p))).getBounds().pad(0.5));
            else map.fitBounds(bounds);
        };
        img.src = path;
    }

    init();
</script>
</body>
</html>
