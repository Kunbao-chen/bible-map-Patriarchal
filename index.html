<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V5.5</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #e0e0e0; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; touch-action: manipulation; }
        body { margin: 0; padding: 0; display: flex; width: 100vw; height: 100vh; overflow: hidden; background: #111; }

        /* 響應式佈局：桌面左右，手機上下 */
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 768px) { #app-container { flex-direction: column; } }

        /* 地圖區域 */
        #map-section { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; min-height: 200px; min-width: 200px; }
        #panzoom-element { display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        
        /* 地圖控制鈕：縮小並上移，避免被手機導航列遮擋 */
        .map-controls { position: absolute; left: 12px; bottom: 40px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .map-controls button { width: 38px; height: 38px; border-radius: 6px; border: 1px solid #ccc; background: rgba(255,255,255,0.85); font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        /* 分隔拉桿 (Resizer) */
        #resizer { background: var(--handle-bg); position: relative; z-index: 1100; display: flex; align-items: center; justify-content: center; }
        /* 桌面版拉桿：垂直條 */
        @media (min-width: 769px) { #resizer { width: 8px; cursor: col-resize; height: 100%; } #resizer::after { content: "||"; color: #999; font-size: 12px; } }
        /* 手機版拉桿：水平條 */
        @media (max-width: 768px) { #resizer { height: 12px; cursor: row-resize; width: 100%; } #resizer::after { content: "=="; color: #999; font-size: 12px; } }

        /* 側邊欄/資訊面板 */
        #side-panel { width: 380px; background: white; display: flex; flex-direction: column; min-width: 280px; min-height: 150px; overflow: hidden; }
        @media (max-width: 768px) { #side-panel { width: 100% !important; flex: 1; } }

        /* 資訊區：修正無法捲動問題 */
        #info-area { display: none; flex-direction: column; background: #fff; flex-shrink: 0; max-height: 70%; border-bottom: 4px solid #f0f0f0; }
        #info-header { padding: 10px 15px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; }
        #info-body { padding: 15px; overflow-y: auto; font-size: 14px; line-height: 1.5; }

        /* 清單區 */
        #list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; position: sticky; top: 0; padding: 10px; text-align: left; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr.active-row td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }
        .spacer { height: 120px; }

        /* 標記 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; background: white; border: 1px solid #777; pointer-events: auto; }
        .marker.highlight { background: var(--gold); color: white; border-color: #fff; z-index: 100; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="map-controls">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>

    <div id="resizer"></div>

    <div id="side-panel">
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()">
                <span id="header-title">📜 事件詳情</span>
                <span id="info-arrow">▼</span>
            </div>
            <div id="info-body">
                <div id="info-time" style="color:#888; font-size:12px;"></div>
                <h3 id="info-title" style="margin:5px 0; color:var(--gold);"></h3>
                <div id="info-path" style="background:#eee; padding:8px; border-radius:4px; margin-bottom:10px;"></div>
                <p><strong>經文：</strong><span id="info-script" style="color:#2980b9;"></span></p>
                <div id="info-note" style="border-top:1px solid #ddd; padding-top:10px; font-size:13px; color:#444;"></div>
            </div>
        </div>
        <div id="list-container">
            <table>
                <thead><tr><th width="45">#</th><th>聖經關鍵事件</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="spacer"></div>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small';

    // === 核心修復：更聰明的地圖切換邏輯 ===
    function checkNeedLarge(locString) {
        const targets = locString.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
        // 修正 77 筆問題：只要地點不在小圖庫，且在大圖庫找得到（模糊匹配），就切換
        return targets.some(p => {
            const inSmall = !!findInDB(p, coordsSmall);
            const inLarge = !!findInDB(p, coordsLarge);
            return !inSmall && inLarge; 
        });
    }

    function findInDB(name, db) {
        if (!name) return null;
        if (db[name]) return { ...db[name], n: name };
        for (let key in db) { if (name.includes(key) || key.includes(name)) return { ...db[key], n: key }; }
        return null;
    }

    // === 面板拉動 (Resizer) 邏輯 ===
    const resizer = document.getElementById('resizer');
    const sidePanel = document.getElementById('side-panel');
    const mapSection = document.getElementById('map-section');

    resizer.addEventListener('mousedown', initDrag);
    resizer.addEventListener('touchstart', initDrag);

    function initDrag(e) {
        e.preventDefault();
        window.addEventListener('mousemove', doDrag);
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchmove', doDrag);
        window.addEventListener('touchend', stopDrag);
    }

    function doDrag(e) {
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        if (window.innerWidth > 768) {
            const newWidth = window.innerWidth - clientX;
            sidePanel.style.width = newWidth + 'px';
        } else {
            const newHeight = window.innerHeight - clientY;
            sidePanel.style.height = newHeight + 'px';
        }
        syncOverlay();
    }

    function stopDrag() {
        window.removeEventListener('mousemove', doDrag);
        window.removeEventListener('touchmove', doDrag);
    }

    // === 資料處理與顯示 ===
    async function loadData() {
        const t = Date.now();
        const [s, l, d] = await Promise.all([
            fetch(`小圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`大圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`data.csv?t=${t}`).then(r => r.text())
        ]);

        parseCSV(s).forEach(r => { if(r[1]) coordsSmall[r[1].trim()] = {x:r[5], y:r[6]}; });
        parseCSV(l).forEach(r => { if(r[1]) coordsLarge[r[1].trim()] = {x:r[5], y:r[6]}; });

        const tbody = document.getElementById('table-body');
        eventData = parseCSV(d).slice(1).filter(r => r.length > 2).map((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r[0]||''}</td><td>${r[2]||''}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tbody.appendChild(tr);
            return { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
        });

        document.getElementById('bg-map').onload = syncOverlay;
        syncOverlay();
    }

    async function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        const item = eventData[idx];

        const needLarge = checkNeedLarge(item.loc);
        if (currentMap !== (needLarge ? 'large' : 'small')) {
            currentMap = needLarge ? 'large' : 'small';
            document.getElementById('bg-map').src = needLarge ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            await new Promise(res => document.getElementById('bg-map').onload = res);
            syncOverlay();
        }

        const db = currentMap === 'large' ? coordsLarge : coordsSmall;
        const rawLocs = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
        const actives = rawLocs.map(p => findInDB(p, db)).filter(p => p);

        renderMarkers(db, actives);
        if (actives.length) flyTo(actives);
        updateInfoPanel(item);
    }

    function renderMarkers(db, actives) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        
        if (actives.length > 1) {
            for (let i = 0; i < actives.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', actives[i].x+'%'); line.setAttribute('y1', actives[i].y+'%');
                line.setAttribute('x2', actives[i+1].x+'%'); line.setAttribute('y2', actives[i+1].y+'%');
                line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3'); line.setAttribute('stroke-dasharray', '5,5');
                sl.appendChild(line);
            }
        }

        Object.keys(db).forEach(name => {
            const isA = actives.some(a => a.n === name);
            const m = document.createElement('div');
            m.className = isA ? 'marker highlight' : 'marker';
            m.style.left = db[name].x + '%'; m.style.top = db[name].y + '%';
            m.innerText = name;
            ml.appendChild(m);
        });
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `路徑：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
        document.getElementById('info-body').scrollTop = 0; // 每次切換回到頂部
    }

    function toggleInfo() {
        const body = document.getElementById('info-body');
        const arrow = document.getElementById('info-arrow');
        body.style.display = (body.style.display === 'none') ? 'block' : 'none';
        arrow.innerText = (body.style.display === 'none') ? '▲' : '▼';
    }

    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map');
        const ov = document.getElementById('overlay-container');
        ov.style.width = img.clientWidth + 'px'; ov.style.height = img.clientHeight + 'px';
    }

    function flyTo(pts) {
        let sx=0, sy=0;
        pts.forEach(p => { sx += parseFloat(p.x); sy += parseFloat(p.y); });
        const tx = (sx/pts.length/100)*document.getElementById('bg-map').clientWidth;
        const ty = (sy/pts.length/100)*document.getElementById('bg-map').clientHeight;
        const sc = pz.getScale();
        pz.pan((document.getElementById('map-section').offsetWidth/2)-(tx*sc), (document.getElementById('map-section').offsetHeight/2)-(ty*sc), {animate:true});
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 5, minScale: 0.1, contain: 'outside' });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        loadData();
    };
</script>
</body>
</html>
