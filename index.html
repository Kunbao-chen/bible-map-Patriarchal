<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V10.8.0b</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; 
            background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; 
        }
        
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        
        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.5); border-radius: 50%; margin-bottom: 2px; }
        .marker .label { 
            opacity: 0; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); 
            border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; 
            color: var(--brown); transition: opacity 0.4s ease-in-out, transform 0.2s ease; pointer-events: none;
        }
        .marker.region-type .label { background: none !important; border: none !important; font-family: 'ZCOOL KuaiLe', cursive; color: var(--ink-blue); text-shadow: 0 0 5px #fdf6e3, 0 0 2px #fdf6e3; }
        .marker.highlight { z-index: 1000 !important; }
        .marker.highlight .label { opacity: 1 !important; background: #fffde7 !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; pointer-events: auto !important; }

        .search-container { position: absolute; right: 12px; top: 12px; z-index: 2000; display: flex; flex-direction: column; align-items: flex-end; }
        .search-bar-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); border-radius: 10px; border: 2px solid var(--brown); padding: 2px; }
        .search-clear { cursor: pointer; display: none; padding: 0 8px; color: var(--brown); font-weight: bold; font-size: 18px; order: -1; }
        #search-input { width: 0; opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: none; background: transparent; height: 32px; outline: none; font-size: 14px; }
        #search-input.open { width: 160px; opacity: 1; padding: 0 8px; }
        .search-btn { width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: transparent; border: none; }

        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; }
        @media (min-width: 801px), (orientation: landscape) { #resizer-main { width: 12px; cursor: col-resize; height: 100%; } #resizer-main::after { content: "⋮"; } }
        
        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #list-container { flex: 1; overflow-y: auto; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 10.8.0b 除錯文字區域 */
        #debug-info { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 3000; pointer-events: none; border-radius: 4px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <div id="search-clear" class="search-clear" onclick="clearSearch()">×</div>
                <input type="text" id="search-input" placeholder="搜尋..." oninput="handleSearch()" onfocus="showHistory()">
                <button class="search-btn" onclick="toggleSearch()"><svg viewBox="0 0 24 24" width="20" fill="#5d4037"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
            </div>
            <div id="search-history" style="display:none; position:absolute; top:40px; background:white; width:200px; border:1px solid #ccc; z-index:2100;"></div>
        </div>

        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        
        <div id="debug-info">(等待數據載入...)</div>
    </div>
    
    <div id="resizer-main"></div>
    
    <div id="side-panel">
        <div id="folder-nav"><select id="folder-select" onchange="loadProject(this.value)" style="width:100%; padding:8px;"><option value="">載入中...</option></select></div>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = [], currentFolder = '', currentMapIdx = -1, currentEventIdx = -1;

    // --- 10.8.0b 核心 FlyTo 除錯邏輯 ---
    function flyTo(pts) {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        if (!img || !img.offsetWidth) return;

        // 1. 取得圖片 X 總長 (動態取得)
        const currentImgW = img.offsetWidth;

        // 2. 計算地點在圖上的 X 座標 (PX)
        let tx = 0; 
        pts.forEach(p => { tx += parseFloat(p.x); });
        const avgX = tx / pts.length;
        const px = (avgX / 100) * currentImgW;

        // 3. 取得現在容器中心 X
        const viewCenterX = c.clientWidth / 2;
        const sc = pz.getScale();

        // ─── Flyto 前：取得地點在容器中的物理 X 座標 ───
        const panBefore = pz.getPan();
        const containerXBefore = (px * sc) + panBefore.x;

        // 4. 執行 10.7.0 原始算法 (維持 10.7.0 邏輯)
        const finalX = viewCenterX / sc - px;
        const finalY = (c.clientHeight / 2) / sc - (parseFloat(pts[0].y) / 100 * img.offsetHeight);
        
        pz.pan(finalX, finalY, { animate: true });

        // 5. Flyto 後：實測最終位置並顯示除錯資訊
        setTimeout(() => {
            const panAfter = pz.getPan();
            const containerXAfter = (px * sc) + panAfter.x;
            const debugEl = document.getElementById('debug-info');
            if (debugEl) {
                // 格式：(倍率 | 圖片總長 | 地點圖x | 容器中心x | flyto前容器x | flyto後容器x)
                debugEl.innerText = `(${sc.toFixed(2)} | W:${currentImgW} | 圖x:${px.toFixed(0)} | 中:${viewCenterX.toFixed(0)} | 前:${containerXBefore.toFixed(0)} | 後:${containerXAfter.toFixed(0)})`;
            }
        }, 350);
    }

    // --- 其餘原始功能保留 ---
    function toggleSearch() { const i = document.getElementById('search-input'); i.classList.toggle('open'); if(i.classList.contains('open')) i.focus(); }
    function clearSearch() { document.getElementById('search-input').value = ''; handleSearch(""); }
    function handleSearch() {
        const term = document.getElementById('search-input').value.trim().toLowerCase();
        filteredData = term ? eventData.filter(d => Object.values(d).join(' ').toLowerCase().includes(term)) : [...eventData];
        renderTable(filteredData);
    }

    async function updateMapAndInfo(item) {
        let targetMapIdx = 1; // 簡化搜尋邏輯以符合手術刀協議
        if (currentMapIdx !== targetMapIdx) {
            currentMapIdx = targetMapIdx;
            const img = document.getElementById('bg-map');
            img.src = `${currentFolder}/picture-${targetMapIdx}.png`;
            await new Promise(res => img.onload = () => { syncOverlay(); res(); });
        }
        const mapData = allCoords.filter(c => c.mapIdx === targetMapIdx);
        const logic = { points: mapData.filter(d => item.loc.includes(d.n)), paths: [] };
        renderVisuals(mapData, logic);
    }

    function renderVisuals(db, logic) {
        const ml = document.getElementById('marker-layer');
        ml.innerHTML = '';
        db.forEach(data => {
            const isH = logic.points.some(p => p.n === data.n);
            const m = document.createElement('div'); m.className = `marker ${isH ? 'highlight' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.innerHTML = `<div class="dot"></div><div class="label" style="opacity:${isH?1:0}">${data.n}</div>`;
            ml.appendChild(m);
        });
        if (logic.points.length) flyTo(logic.points);
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body'); tbody.innerHTML = '';
        data.forEach((item, i) => {
            const tr = document.createElement('tr'); tr.innerHTML = `<td style="padding:10px;">${item.event}</td>`;
            tr.onclick = () => { currentEventIdx = i; updateMapAndInfo(item); };
            tbody.appendChild(tr);
        });
    }

    function parseCSV(t) { return t.split('\n').map(r => r.split(',')); }

    async function loadProject(folder) {
        currentFolder = folder;
        const dRes = await fetch(`${folder}/data.csv`);
        eventData = parseCSV(await dRes.text()).slice(1).map(r => ({ event: r[2], loc: r[3] }));
        const cRes = await fetch(`${folder}/coords-1.csv`);
        allCoords = parseCSV(await cRes.text()).slice(1).map(r => ({ n: r[1], x: r[5], y: r[6], mapIdx: 1 }));
        renderTable(eventData);
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        // --- 10.8.0b 變動：暫時關閉 contain ---
        pz = Panzoom(el, { maxScale: 8, contain: false });
        
        el.addEventListener('panzoomchange', () => {
            const pan = pz.getPan();
            const debugEl = document.getElementById('debug-info');
            if(debugEl) debugEl.innerText = `(手動平移中 | Scale: ${pz.getScale().toFixed(2)} | PanX: ${pan.x.toFixed(0)})`;
        });
        
        const fRes = await fetch(`folder.csv`);
        const folders = parseCSV(await fRes.text()).slice(1);
        const select = document.getElementById('folder-select');
        folders.forEach(f => { if(f[0]){ const o = document.createElement('option'); o.value=f[0]; o.innerText=f[1]; select.appendChild(o); } });
    };
</script>
</body>
</html>
