<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V10.2.1</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #ddd; --brown: #5d4037; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        /* 響應式佈局 */
        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }
        @media (orientation: landscape) {
            .fab-menu { flex-direction: row !important; } /* 橫向時選單橫著長 */
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        
        /* 可愛手繪感控制鈕 */
        .fab-container { position: absolute; left: 15px; top: 15px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .fab-main { 
            width: 52px; height: 52px; background: rgba(255,255,255,0.4); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 2px solid var(--brown); border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .fab-main svg { width: 30px; height: 30px; fill: var(--brown); transition: transform 0.3s; }
        .fab-main.open svg { transform: rotate(45deg); }

        .fab-menu { display: none; flex-direction: column; gap: 8px; padding: 5px; }
        .fab-menu.show { display: flex; }
        .fab-item { 
            width: 42px; height: 42px; border-radius: 12px; border: 1.5px solid var(--brown);
            background: rgba(255,255,255,0.8); font-size: 16px; font-weight: bold;
            color: var(--brown); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* 搜尋框 */
        .search-container { position: absolute; right: 15px; top: 15px; z-index: 2000; display: flex; align-items: center; }
        #search-input { 
            width: 0; opacity: 0; transition: all 0.3s;
            border: 2px solid var(--brown); border-radius: 12px; outline: none; 
            background: #fff; height: 42px; 
        }
        #search-input.open { width: 180px; opacity: 1; padding: 0 12px; margin-right: 8px; }
        .search-btn { 
            width: 48px; height: 48px; border-radius: 14px; border: 2px solid var(--brown);
            background: rgba(255,255,255,0.4); backdrop-filter: blur(8px);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .search-btn svg { width: 26px; height: 26px; fill: var(--brown); }

        /* 地圖標籤 (維持 10.2 邏輯) */
        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; z-index: 10; }
        .marker .dot { width: 6px; height: 6px; background: rgba(93,64,55,0.5); border-radius: 50%; margin-bottom: 2px; }
        .marker .label { padding: 3px 8px; border-radius: 10px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; transition: opacity 0.2s; color: var(--brown); }
        .marker.highlight { z-index: 1000; }
        .marker.highlight .dot { background: #d32f2f; width: 8px; height: 8px; }
        .marker.highlight .label { background: #fffde7; border-width: 2px; opacity: 1 !important; visibility: visible !important; }

        /* 面板與拉桿 */
        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; }
        @media (min-width: 801px), (orientation: landscape) { #resizer-main { width: 12px; cursor: col-resize; height: 100%; } #resizer-main::after { content: "⋮"; } }
        @media (max-width: 800px) and (orientation: portrait) { #resizer-main { height: 16px; cursor: row-resize; width: 100%; } #resizer-main::after { content: "⋯"; } }
        
        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; }
        #info-area { display: none; flex-direction: column; background: #fff; overflow: hidden; flex: 0 0 45%; }
        #info-header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; font-size: 15px; border-bottom: 1px solid #eee; }
        #resizer-inner { height: 10px; background: #eee; cursor: row-resize; display: flex; align-items: center; justify-content: center; }
        #list-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
        
        #folder-nav { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; }
        #folder-select { width: 100%; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜尋..." oninput="handleSearch()">
            <button class="search-btn" onclick="toggleSearch()" id="search-toggle-btn">
                <svg id="svg-search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
        </div>

        <div class="fab-container">
            <button class="fab-main" id="fab-main-btn" onclick="toggleFab()">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
            <div id="fab-menu" class="fab-menu">
                <button class="fab-item" onclick="pz.zoomIn()">+</button>
                <button class="fab-item" onclick="pz.zoomOut()">-</button>
                <button class="fab-item" onclick="changeMarkerSize(1)">A+</button>
                <button class="fab-item" onclick="changeMarkerSize(-1)">A-</button>
                <button class="fab-item" onclick="resetView()">↺</button>
            </div>
        </div>

        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>

    <div id="resizer-main"></div>

    <div id="side-panel">
        <div id="folder-nav">
            <select id="folder-select" onchange="loadProject(this.value)">
                <option value="">載入中...</option>
            </select>
        </div>
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()">
                <div>📜 事件詳情 <span id="info-arrow">▼</span></div>
                <div style="display:flex; gap:10px;" onclick="event.stopPropagation()">
                    <button onclick="navEvent(-1)" style="padding:4px 10px; background:var(--gold); border:none; color:white;">◀</button>
                    <button onclick="navEvent(1)" style="padding:4px 10px; background:var(--gold); border:none; color:white;">▶</button>
                </div>
            </div>
            <div id="info-body">
                <div id="info-time" style="color:#888; font-size:12px;"></div>
                <h3 id="info-title" style="color:var(--gold); margin:5px 0;"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; margin-bottom:10px; font-size:14px; font-weight:bold;"></div>
                <p><strong>經文：</strong><span id="info-script" style="color:#2980b9;"></span></p>
                <div id="info-note" style="border-top:1px solid #eee; padding-top:10px; font-size:14px;"></div>
            </div>
        </div>
        <div id="resizer-inner"></div>
        <div id="list-container">
            <table><tbody id="table-body"></tbody></table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = []; 
    let currentFolder = '', currentMapIdx = -1, currentEventIdx = -1;
    let baseMarkerFontSize = 13, locFreq = {};

    // 1. 搜尋邏輯
    function toggleSearch() {
        const input = document.getElementById('search-input');
        const btnIcon = document.getElementById('svg-search-icon');
        if (input.classList.contains('open')) {
            input.value = ''; input.classList.remove('open');
            btnIcon.innerHTML = '<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>';
            handleSearch();
        } else {
            input.classList.add('open');
            btnIcon.innerHTML = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';
            input.focus();
        }
    }

    function handleSearch() {
        const term = document.getElementById('search-input').value.toLowerCase();
        filteredData = eventData.filter(d => 
            d.time.toLowerCase().includes(term) || d.event.toLowerCase().includes(term) || 
            d.loc.toLowerCase().includes(term) || d.note.toLowerCase().includes(term)
        );
        renderTable(filteredData);
    }

    // 2. 選單邏輯
    function toggleFab() { 
        document.getElementById('fab-menu').classList.toggle('show');
        document.getElementById('fab-main-btn').classList.toggle('open');
    }

    function changeMarkerSize(delta) {
        baseMarkerFontSize = Math.max(8, Math.min(30, baseMarkerFontSize + delta));
        applyMarkerStyles();
        refreshCollision();
    }

    function applyMarkerStyles() {
        const scale = pz ? pz.getScale() : 1;
        const antiScale = scale > 1 ? 1 / scale : 1;
        document.querySelectorAll('.marker').forEach(m => {
            const gain = parseInt(m.dataset.size) || 0;
            m.querySelector('.label').style.fontSize = (baseMarkerFontSize + gain) + 'px';
            m.style.transform = `translate(-50%, -50%) scale(${antiScale})`;
        });
    }

    function refreshCollision() {
        const markers = Array.from(document.querySelectorAll('.marker'));
        if (!markers.length) return;
        markers.sort((a, b) => {
            const aHi = a.classList.contains('highlight'), bHi = b.classList.contains('highlight');
            if (aHi !== bHi) return aHi ? -1 : 1;
            const aS = parseInt(a.dataset.size) || 0, bS = parseInt(b.dataset.size) || 0;
            return (bS - aS) || ((locFreq[b.dataset.name]||0) - (locFreq[a.dataset.name]||0));
        });
        const occupied = [];
        markers.forEach(m => {
            const label = m.querySelector('.label');
            label.style.opacity = "1";
            const rect = label.getBoundingClientRect();
            const overlap = occupied.some(o => !(rect.right<o.left || rect.left>o.right || rect.bottom<o.top || rect.top>o.bottom));
            if (overlap && !m.classList.contains('highlight')) label.style.opacity = "0";
            else occupied.push(rect);
        });
    }

    // 3. 核心 Resizer 與轉向修正 (必要改動)
    function initResizers() {
        const rMain = document.getElementById('resizer-main'), side = document.getElementById('side-panel');
        const dragM = (e) => {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            // 即時判定方向，不預設
            if (window.innerWidth < window.innerHeight) {
                side.style.flex = `0 0 ${window.innerHeight - y}px`;
                side.style.width = '100%';
            } else {
                side.style.width = `${window.innerWidth - x}px`;
                side.style.flex = 'none';
            }
            syncOverlay(); updateMinScale(); refreshCollision();
        };
        rMain.onmousedown = () => { window.onmousemove = dragM; window.onmouseup = () => window.onmousemove = null; };
        rMain.ontouchmove = dragM;

        window.addEventListener('resize', () => {
            side.style.width = ''; side.style.height = ''; side.style.flex = '';
            syncOverlay(); updateMinScale();
        });

        const rInner = document.getElementById('resizer-inner'), area = document.getElementById('info-area');
        const dragI = (e) => {
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            area.style.flex = `0 0 ${Math.max(80, y - area.getBoundingClientRect().top)}px`;
        };
        rInner.onmousedown = () => { window.onmousemove = dragI; window.onmouseup = () => window.onmousemove = null; };
        rInner.ontouchmove = dragI;
    }

    // 4. 資料載入 (維持 V10.2 邏輯)
    async function init() {
        try {
            const res = await fetch(`folder.csv?t=${Date.now()}`);
            const folders = parseCSV(await res.text()).slice(1);
            const select = document.getElementById('folder-select');
            select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
            folders.forEach(f => {
                if(f[0]) {
                    const opt = document.createElement('option');
                    opt.value = f[0]; opt.innerText = f[1] || f[0];
                    select.appendChild(opt);
                }
            });
            const last = localStorage.getItem('lastBibleFolder');
            if (last) { select.value = last; loadProject(last); }
        } catch(e) { console.error("Init failed", e); }
    }

    async function loadProject(folder) {
        if (!folder) return;
        currentFolder = folder; localStorage.setItem('lastBibleFolder', folder);
        allCoords = []; locFreq = {};
        
        const dRes = await fetch(`${folder}/data.csv?t=${Date.now()}`);
        eventData = parseCSV(await dRes.text()).slice(1).filter(r => r.length > 2).map(r => {
            if (r[3]) r[3].split('→').forEach(n => {
                const name = n.replace(/\(.*?\)/g, '').trim();
                locFreq[name] = (locFreq[name] || 0) + 1;
            });
            return { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
        });
        filteredData = [...eventData]; renderTable(filteredData);

        for (let x = 1; x <= 15; x++) {
            try {
                const cRes = await fetch(`${folder}/coords-${x}.csv`);
                if (!cRes.ok) break;
                parseCSV(await cRes.text()).forEach(r => {
                    if(r[1]) allCoords.push({ n: r[1].trim(), x: r[5], y: r[6], mapIdx: x, size: parseInt(r[7]) || 0 });
                });
            } catch(e) { break; }
        }
        if(filteredData.length > 0) selectEvent(0);
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        data.forEach((item, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td width="50">${item.id}</td><td>${item.event}</td>`;
            tr.onclick = () => selectEvent(i);
            tbody.appendChild(tr);
        });
    }

    async function selectEvent(idx) {
        currentEventIdx = idx;
        const item = filteredData[idx];
        const rows = document.getElementById('table-body').rows;
        Array.from(rows).forEach((r, i) => r.className = i === idx ? 'active-row' : '');
        
        const locNames = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
        let targetMapIdx = 1;
        for (let x = 1; x <= 15; x++) {
            const db = allCoords.filter(c => c.mapIdx === x);
            if (db.length && locNames.every(name => findBestMatch(name, db))) targetMapIdx = x;
        }

        if (currentMapIdx !== targetMapIdx) {
            currentMapIdx = targetMapIdx;
            const bgImg = document.getElementById('bg-map');
            bgImg.src = `${currentFolder}/picture-${targetMapIdx}.png`;
            await new Promise(res => { bgImg.onload = () => { syncOverlay(); updateMinScale(); res(); }; });
        }
        renderMarkers(allCoords.filter(c => c.mapIdx === targetMapIdx), locNames);
        updateInfoPanel(item);
    }

    function renderMarkers(db, activeNames) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        const actives = activeNames.map(name => findBestMatch(name, db)).filter(p => p);
        if (actives.length > 1) {
            for (let i = 0; i < actives.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', actives[i].x+'%'); line.setAttribute('y1', actives[i].y+'%');
                line.setAttribute('x2', actives[i+1].x+'%'); line.setAttribute('y2', actives[i+1].y+'%');
                line.setAttribute('stroke', '#d32f2f'); line.setAttribute('stroke-width', '3');
                sl.appendChild(line);
            }
        }
        db.forEach(data => {
            const isA = actives.some(a => a.n === data.n);
            const m = document.createElement('div');
            m.className = isA ? 'marker highlight' : 'marker';
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.dataset.size = data.size; m.dataset.name = data.n;
            m.innerHTML = `<div class="dot"></div><div class="label">${data.n}</div>`;
            ml.appendChild(m);
        });
        applyMarkerStyles();
        if (actives.length) flyTo(actives);
        setTimeout(refreshCollision, 60);
    }

    // 工具函式
    function findBestMatch(t, db) {
        let b = null, m = Infinity;
        for (const i of db) {
            if (i.n === t) return i;
            if (i.n.includes(t) || t.includes(i.n)) {
                let d = Math.abs(i.n.length - t.length);
                if (d < m) { m = d; b = i; }
            }
        }
        return b;
    }
    function flyTo(pts) {
        const img = document.getElementById('bg-map'), container = document.getElementById('map-section');
        let tx = 0, ty = 0; pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); });
        const px = (tx / pts.length / 100) * img.offsetWidth, py = (ty / pts.length / 100) * img.offsetHeight;
        const scale = pz.getScale(), ox = img.offsetWidth / 2, oy = img.offsetHeight / 2;
        pz.pan(((container.clientWidth / 2) - ox) / scale - (px - ox), ((container.clientHeight / 2) - oy) / scale - (py - oy), { animate: true });
    }
    function navEvent(step) {
        const n = currentEventIdx + step;
        if (n >= 0 && n < filteredData.length) {
            selectEvent(n);
            document.getElementById('table-body').rows[n].scrollIntoView({behavior:'smooth', block:'center'});
        }
    }
    function updateMinScale() {
        const img = document.getElementById('bg-map'), container = document.getElementById('map-section');
        if (!img.offsetWidth) return;
        const absMin = Math.max(container.clientWidth / img.offsetWidth, container.clientHeight / img.offsetHeight);
        pz.setOptions({ minScale: absMin });
        pz.zoom(pz.getScale() < absMin ? absMin : pz.getScale(), { animate: true });
    }
    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }
    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }
    function toggleInfo() {
        const body = document.getElementById('info-body'), arrow = document.getElementById('info-arrow'), area = document.getElementById('info-area');
        if (body.style.display === 'none') { body.style.display = 'block'; area.style.flex = "0 0 45%"; arrow.innerText = '▼'; }
        else { body.style.display = 'none'; area.style.flex = "0 0 44px"; arrow.innerText = '▲'; }
    }
    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
    }
    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }

    window.onload = () => {
        const el = document.getElementById('panzoom-element');
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        init(); initResizers();
    };
</script>
</body>
</html>
