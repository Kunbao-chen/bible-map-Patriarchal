<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V8.3 (精準修正版)</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #ddd; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #000; }
        
        /* 100% 還原您 8.3 的 Flex 結構：左圖右板 */
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        #map-section { flex-grow: 1; position: relative; overflow: hidden; background: #111; display: flex; justify-content: center; align-items: center; }
        #side-panel { width: 400px; background: #fff; display: flex; flex-direction: column; z-index: 10; }

        /* 資訊區固定在上方 */
        #info-panel { height: 35%; background: #fff; border-bottom: 1px solid #eee; display: none; flex-direction: column; }
        #info-header { background: var(--dark); color: var(--gold); padding: 10px; font-weight: bold; }
        #info-body { flex-grow: 1; padding: 15px; overflow-y: auto; line-height: 1.6; }

        /* 拉桿樣式 */
        #resizer-h { width: 10px; background: var(--handle-bg); cursor: col-resize; }
        #resizer-v { height: 10px; background: var(--handle-bg); cursor: row-resize; }

        /* 事件列表區與新增的控制列 */
        #event-section { flex-grow: 1; display: flex; flex-direction: column; }
        .search-bar { background: #f4f4f4; padding: 8px; border-bottom: 1px solid #ddd; }
        .search-bar select, .search-bar input { width: 100%; padding: 6px; margin-bottom: 4px; border: 1px solid #ccc; border-radius: 4px; }

        #table-container { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        tr.active td { background: rgba(197, 160, 89, 0.15); border-left: 4px solid var(--gold); font-weight: bold; }
        td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }

        #panzoom-element { position: relative; transform-origin: 0 0; }
        #base-map { display: block; max-width: none; pointer-events: none; }
        #overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .btn { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: none; cursor: pointer; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; flex: 1; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img id="base-map" src="">
            <svg id="overlay-svg"></svg>
        </div>
        <div id="controls">
            <button class="btn" onclick="pz.zoomIn()">＋</button>
            <button class="btn" onclick="pz.zoomOut()">－</button>
            <button class="btn" onclick="pz.reset()">↺</button>
        </div>
    </div>

    <div id="resizer-h"></div>

    <div id="side-panel">
        <div id="info-panel">
            <div id="info-header">事件詳情</div>
            <div id="info-body"></div>
        </div>
        
        <div id="resizer-v"></div>

        <div id="event-section">
            <div class="search-bar">
                <select id="folder-select"></select>
                <input type="text" id="search-input" placeholder="🔍 搜尋內容或地點...">
            </div>
            <div id="table-container">
                <table>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], coordData = [];

    async function init() {
        // 載入 folder.csv
        const fRes = await fetch('folder.csv');
        const folders = parseCSV(await fRes.text(), true);
        const select = document.getElementById('folder-select');
        folders.forEach(f => {
            let opt = document.createElement('option');
            opt.value = f.folder_name; opt.textContent = f.display_name;
            select.appendChild(opt);
        });
        select.onchange = (e) => loadData(e.target.value);
        document.getElementById('search-input').oninput = (e) => renderTable(e.target.value);
        if(folders.length > 0) loadData(folders[0].folder_name);
    }

    async function loadData(folder) {
        const [d, c] = await Promise.all([
            fetch(`${folder}/data.csv`).then(r => r.text()),
            fetch(`${folder}/coords_1.csv`).then(r => r.text())
        ]);
        eventData = parseCSV(d, true);
        coordData = parseCSV(c, true);
        const img = document.getElementById('base-map');
        img.src = `${folder}/picture_1.png`;
        img.onload = () => {
            document.getElementById('overlay-svg').setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
            pz.reset();
            renderTable('');
        };
    }

    function renderTable(term) {
        const tb = document.getElementById('table-body');
        tb.innerHTML = '';
        filteredData = eventData.filter(r => 
            Object.values(r).join(' ').toLowerCase().includes(term.toLowerCase())
        );
        filteredData.forEach((row, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td style="width:40px">${row['序號']}</td><td>${row['關鍵事件內容']}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tb.appendChild(tr);
        });
    }

    function selectEvent(idx, tr) {
        const row = filteredData[idx];
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active'));
        tr.classList.add('active');

        const info = document.getElementById('info-panel');
        info.style.display = 'flex';
        document.getElementById('info-body').innerHTML = `<b>${row['關鍵事件內容']}</b><hr>${row['地點 (距離)']}<br>${row['引用經文']}`;

        // 模糊比對邏輯優化
        const locs = row['地點 (距離)'].replace(/\([^)]*\)/g, '').split(/[→,，、]/).map(s => s.trim()).filter(s => s);
        const pts = locs.map(l => coordData.find(c => l.includes(c['地名']) || c['地名'].includes(l))).filter(x => x);
        
        drawMarkers(pts);
    }

    function drawMarkers(pts) {
        const svg = document.getElementById('overlay-svg');
        const img = document.getElementById('base-map');
        svg.innerHTML = '';
        if(!pts.length) return;
        let sx = 0, sy = 0;
        pts.forEach(p => {
            const x = parseFloat(p['百分比X'])/100 * img.naturalWidth;
            const y = parseFloat(p['百分比Y'])/100 * img.naturalHeight;
            sx += x; sy += y;
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.innerHTML = `<circle cx="${x}" cy="${y}" r="8" fill="red" stroke="#fff" stroke-width="2" />
                           <text x="${x+12}" y="${y+5}" fill="white" font-weight="bold" style="text-shadow: 1px 1px 2px black;">${p['地名']}</text>`;
            svg.appendChild(g);
        });
        const s = pz.getScale();
        pz.pan((document.getElementById('map-section').clientWidth/2) - (sx/pts.length * s), 
               (document.getElementById('map-section').clientHeight/2) - (sy/pts.length * s), {animate:true});
    }

    function parseCSV(text, hasHeader) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        const rows = lines.map(l => l.split(','));
        if(!hasHeader) return rows;
        const h = rows.shift().map(x => x.trim().replace(/^\ufeff/, ''));
        return rows.map(r => { let o = {}; h.forEach((k, i) => o[k] = r[i]); return o; });
    }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 8, contain: 'outside' });
        init();
        
        // 拉桿邏輯
        const resH = document.getElementById('resizer-h'), resV = document.getElementById('resizer-v');
        const side = document.getElementById('side-panel'), info = document.getElementById('info-panel');
        let isH = false, isV = false;
        resH.onmousedown = () => isH = true;
        resV.onmousedown = () => isV = true;
        document.onmousemove = (e) => {
            if(isH) side.style.width = (window.innerWidth - e.clientX) + 'px';
            if(isV) info.style.height = (e.clientY - side.offsetTop) + 'px';
        };
        document.onmouseup = () => isH = isV = false;
    };
</script>
</body>
</html>
