<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聖經史地互動地圖 V1.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; --base-fs: 14px; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }

        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; order: 2; height: 40%; }
            #map-section { width: 100% !important; order: 1; flex: 1; }
        }

        #map-section { flex: 1; position: relative; background: #eee; overflow: hidden; cursor: grab; }
        #panzoom-element { display: inline-block; position: relative; }
        #map-image { display: block; max-width: none; user-select: none; -webkit-user-drag: none; }

        #side-panel { width: 350px; background: white; display: flex; flex-direction: column; border-left: 1px solid #ccc; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 10; position: relative; }
        #panel-header { padding: 15px; background: var(--dark); color: white; }
        #folder-select { width: 100%; padding: 8px; font-size: 16px; border-radius: 4px; }

        #event-list-container { flex: 1; overflow-y: auto; border-bottom: 1px solid #eee; }
        .event-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; font-size: var(--base-fs); color: #444; }
        .event-item:hover { background: #f9f9f9; }
        .event-item.active { background: #fff9e6; border-left: 4px solid var(--gold); font-weight: bold; }

        #info-area { padding: 20px; background: #fff; display: none; flex-direction: column; gap: 10px; overflow-y: auto; height: 100%; position: absolute; top: 0; left: 0; right: 0; z-index: 20; }
        #info-title { font-size: 20px; color: var(--brown); margin: 0; font-family: 'ZCOOL KuaiLe', cursive; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        .info-label { font-size: 13px; color: #888; margin-bottom: 2px; }
        #info-note { line-height: 1.6; color: #333; white-space: pre-wrap; margin-top: 10px; }
        
        .script-link { color: #1a73e8; text-decoration: underline; cursor: pointer; margin-right: 5px; font-weight: bold; }
        .script-link:hover { color: #d93025; }

        #scripture-modal { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; background: white; z-index: 1000; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #ccc; overflow: hidden; }
        #modal-header { padding: 10px 20px; background: #f1f3f4; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        #scripture-frame { width: 100%; height: calc(100% - 50px); border: none; }

        .marker { position: absolute; transform: translate(-50%, -100%); width: 30px; height: 30px; cursor: pointer; z-index: 5; transition: transform 0.2s, filter 0.2s; }
        .marker-icon { width: 100%; height: 100%; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        .marker-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); background: var(--ink-blue); color: white; padding: 1px 6px; border-radius: 10px; font-size: 11px; white-space: nowrap; pointer-events: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img id="map-image" src="" alt="聖經地圖">
            <div id="marker-layer"></div>
        </div>
    </div>

    <div id="side-panel">
        <div id="panel-header">
            <select id="folder-select"></select>
        </div>
        <div id="event-list-container">
            <div id="event-list"></div>
        </div>
        <div id="info-area">
            <button onclick="document.getElementById('info-area').style.display='none'" style="align-self: flex-start; margin-bottom: 10px;">← 返回列表</button>
            <h2 id="info-title"></h2>
            <div><div class="info-label">時間</div><div id="info-time"></div></div>
            <div><div class="info-label">地點</div><div id="info-path"></div></div>
            <div><div class="info-label">相關經文</div><div id="info-script"></div></div>
            <div id="info-note"></div>
        </div>
    </div>
</div>

<div id="scripture-modal">
    <div id="modal-header">
        <strong id="modal-title">經文閱讀</strong>
        <button onclick="document.getElementById('scripture-modal').style.display='none'">關閉視窗</button>
    </div>
    <iframe id="scripture-frame"></iframe>
</div>

<script>
    // V1.1.0 補齊所有經文縮寫對應值 (解決問題 4)
    const SCRIPTURE_PHYSICAL_MAP = { 
        "創": "ot/gen", "出": "ot/ex", "利": "ot/lev", "民": "ot/num", "申": "ot/deut", "書": "ot/josh", "士": "ot/judg", "得": "ot/ruth", "撒上": "ot/1-sam", "撒下": "ot/2-sam", "王上": "ot/1-kgs", "王下": "ot/2-kgs", "代上": "ot/1-chr", "代下": "ot/2-chr", "拉": "ot/ezra", "尼": "ot/neh", "斯": "ot/esth", "伯": "ot/job", "詩": "ot/ps", "箴": "ot/prov", "傳": "ot/eccl", "歌": "ot/ss", "賽": "ot/isa", "耶": "ot/jer", "哀": "ot/lam", "結": "ot/ezek", "但": "ot/dan", "單": "ot/dan", "何": "ot/hos", "珥": "ot/joel", "摩": "ot/amos", "俄": "ot/obad", "拿": "ot/jonah", "彌": "ot/micah", "鴻": "ot/nahum", "哈": "ot/hab", "番": "ot/zeph", "該": "ot/hag", "亞": "ot/zech", "瑪": "ot/mal", 
        "太": "nt/matt", "可": "nt/mark", "路": "nt/luke", "約": "nt/john", "徒": "nt/acts", "羅": "nt/rom", "林前": "nt/1-cor", "林後": "nt/2-cor", "加": "nt/gal", "弗": "nt/eph", "腓": "nt/phil", "西": "nt/col", "帖前": "nt/1-thes", "帖後": "nt/2-thes", "提前": "nt/1-tim", "提後": "nt/2-tim", "多": "nt/titus", "門": "nt/philem", "來": "nt/heb", "雅": "nt/james", "彼前": "nt/1-pet", "彼後": "nt/2-pet", "約一": "nt/1-jn", "約二": "nt/2-jn", "約三": "nt/3-jn", "猶": "nt/jude", "啟": "nt/rev", 
        "教約": "dc-testament/dc", "罕": "pgp/abr", "摩西": "pgp/moses", "約太": "pgp/js-m", "約史": "pgp/js-h", "信": "pgp/a-of-f",
        "腓一": "bofm/1-ne", "腓二": "bofm/2-ne", "各": "bofm/jacob", "挪": "bofm/enos", "龍": "bofm/jarom", "奧": "bofm/omni", "語": "bofm/w-of-m", "摩賽": "bofm/mosiah", "阿": "bofm/alma", "曼": "bofm/hel", "腓三": "bofm/3-ne", "腓四": "bofm/4-ne", "摩爾門": "bofm/morm", "以": "bofm/ether", "乃": "bofm/moro" 
    };

    let pz, currentData = [], lastPortraitHeight = "40%", lastLandscapeWidth = "350px";

    function parseCSV(text) {
        return text.split('\n').filter(l => l.trim()).map(line => {
            let res = [], curr = '', inQ = false;
            for (let i=0; i<line.length; i++) {
                let c = line[i];
                if (c === '"') inQ = !inQ;
                else if (c === ',' && !inQ) { res.push(curr.trim()); curr = ''; }
                else curr += c;
            }
            res.push(curr.trim()); return res;
        });
    }

    // V1.1.0 修正：增加備援連結邏輯 (解決問題 3)
    function openScripture(bookKey, chap, sec, endSec) {
        const path = SCRIPTURE_PHYSICAL_MAP[bookKey];
        let url = "";
        if (path) {
            url = `https://www.churchofjesuschrist.org/study/scriptures/${path}/${chap}?lang=zho`;
            if (sec) url += `&id=${endSec ? 'p'+sec+'-p'+endSec : 'p'+sec}#p${sec}`;
        } else {
            // LDS 無法對應時連向外部網站
            url = `https://bible.fhl.net/new/read.php?chineses=${encodeURIComponent(bookKey)}&chap=${chap}`;
        }
        document.getElementById('scripture-frame').src = url;
        document.getElementById('scripture-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = `${bookKey} 第 ${chap} 章`;
    }

    // V1.1.0 修正：強化正則表達式解析 (解決問題 1, 2)
    function updateInfoPanel(item) { 
        if(!item) return;
        document.getElementById('info-area').style.display = 'flex'; 
        document.getElementById('info-title').innerText = item.event; 
        document.getElementById('info-time').innerText = item.time; 
        document.getElementById('info-path').innerText = `地點：${item.loc}`; 
        
        const scriptEl = document.getElementById('info-script');
        const scriptRaw = item.script || "";
        const ldsLinkRaw = item.ldsLink || ""; 

        // 依長度排序確保長詞優先匹配 (如「教約」先於「約」)
        const sortedKeys = Object.keys(SCRIPTURE_PHYSICAL_MAP).sort((a, b) => b.length - a.length);
        const bookPattern = sortedKeys.join('|');
        // 增加邊界檢查，確保書名後接數字且不抓取括號
        const regex = new RegExp(`(${bookPattern})\\s*(\\d+)(?::(\\d+)(?:-(\\d+))?)?`, 'g');
        
        const wrapLink = (m, b, c, s, e) => `<span class="script-link" onclick="openScripture('${b}', ${c}, '${s||""}', '${e||""}')">${m}</span>`;
        
        scriptEl.innerHTML = scriptRaw.replace(regex, wrapLink);
        const linkedLdsContent = ldsLinkRaw.replace(regex, wrapLink);
        
        document.getElementById('info-note').innerHTML = `<div>${item.note || ""}</div>` + 
            (ldsLinkRaw ? `<div style="margin-top:10px; border-top:1px dashed #ccc; padding-top:10px;"><strong>正典關聯：</strong><br>${linkedLdsContent}</div>` : "");
    }

    async function loadProject(folder) {
        localStorage.setItem('lastBibleFolder', folder);
        const [mRes, dRes] = await Promise.all([
            fetch(`${folder}/coords.csv?t=${Date.now()}`),
            fetch(`${folder}/data.csv?t=${Date.now()}`)
        ]);
        const coords = parseCSV(await mRes.text()).slice(1);
        currentData = parseCSV(await dRes.text()).slice(1).map(r => ({
            id: r[0], time: r[1], event: r[2], loc: r[3], note: r[4], script: r[5], ldsLink: r[6]
        }));

        document.getElementById('map-image').src = `${folder}/map.jpg`;
        const layer = document.getElementById('marker-layer'); layer.innerHTML = '';
        coords.forEach(c => {
            if(!c[1]) return;
            const div = document.createElement('div'); div.className = 'marker';
            div.style.left = c[1]+'px'; div.style.top = c[2]+'px';
            div.innerHTML = `<img src="https://maps.google.com/mapfiles/ms/icons/red-dot.png" class="marker-icon"><div class="marker-label">${c[0]}</div>`;
            div.onclick = () => {
                const item = currentData.find(d => d.loc === c[0]);
                if(item) {
                    updateInfoPanel(item);
                    document.querySelectorAll('.event-item').forEach(e => e.classList.toggle('active', e.dataset.id === item.id));
                    const target = document.querySelector(`.event-item[data-id="${item.id}"]`);
                    if(target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            };
            layer.appendChild(div);
        });

        const list = document.getElementById('event-list'); list.innerHTML = '';
        currentData.forEach(item => {
            const div = document.createElement('div'); div.className = 'event-item';
            div.dataset.id = item.id; div.innerText = `${item.id}. ${item.event}`;
            div.onclick = () => {
                updateInfoPanel(item);
                document.querySelectorAll('.event-item').forEach(e => e.classList.remove('active'));
                div.classList.add('active');
                const c = coords.find(cc => cc[0] === item.loc);
                if(c) pz.pan(window.innerWidth/2 - c[1]*pz.getScale(), window.innerHeight/2 - c[2]*pz.getScale(), { animate: true });
            };
            list.appendChild(div);
        });
    }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element'); 
        pz = Panzoom(el, { maxScale: 8, contain: 'outside', animate: true });
        
        window.addEventListener('resize', () => { 
            const side = document.getElementById('side-panel');
            if (window.innerWidth < window.innerHeight) {
                side.style.width = ""; side.style.height = lastPortraitHeight; side.style.flex = `0 0 ${lastPortraitHeight}`;
            } else {
                side.style.height = ""; side.style.width = lastLandscapeWidth; side.style.flex = "none";
            }
        });

        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        
        const res = await fetch(`folder.csv?t=${Date.now()}`); 
        const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select'); 
        select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => { 
            if(f[0]) { 
                const opt = document.createElement('option'); 
                opt.value = f[0]; opt.innerText = f[1] || f[0]; 
                select.appendChild(opt); 
            } 
        });
        select.onchange = (e) => e.target.value && loadProject(e.target.value);
        const last = localStorage.getItem('lastBibleFolder'); 
        if (last) { select.value = last; loadProject(last); }
    };
</script>

</body>
</html>
