<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞伯拉罕史地互動系統 V2.0</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg-dark: #2c3e50; --text-light: #ecf0f1; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #eee; }
        
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        @media (min-aspect-ratio: 1/1) { #app-container { flex-direction: row; } }

        /* 地圖區塊 */
        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #333; cursor: grab; }
        #map-section:active { cursor: grabbing; }
        #panzoom-element { position: relative; display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-height: 95vh; width: auto; }
        
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* 標籤樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 3px 8px; border-radius: 20px; font-size: 11px; background: rgba(255,255,255,0.9); border: 1px solid #666; white-space: nowrap; transition: opacity 0.3s; }
        .marker.active { background: var(--gold); color: white; border: 2px solid white; font-size: 14px; z-index: 100; opacity: 1 !important; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .marker.low-priority { opacity: 0.5; font-size: 9px; }

        /* 表格區塊 */
        #table-section { flex: 1; background: white; overflow-y: auto; border-top: 4px solid var(--gold); }
        @media (min-aspect-ratio: 1/1) { #table-section { border-top: none; border-left: 4px solid var(--gold); } }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--gold); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 20; }
        td { padding: 12px; border-bottom: 1px solid #ddd; cursor: pointer; }
        tr.selected td { background: #fff9c4; font-weight: bold; }

        /* 可拖動資訊框 */
        #info-box { position: absolute; top: 50px; left: 50px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 8px solid var(--gold); z-index: 2000; display: none; cursor: default; }
        #info-header { padding: 10px; background: #f9f9f9; cursor: move; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; border-radius: 12px 12px 0 0; }
        #info-body { padding: 15px; max-height: 400px; overflow-y: auto; }
        #info-body p { margin: 8px 0; font-size: 13px; line-height: 1.5; }
        .loc-tag { background: #eee; color: #333; padding: 2px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; display: inline-block; }
        .loc-tag:hover { background: var(--gold); color: white; }

        /* 控制按鈕 */
        .controls { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 5px; }
        .controls button { width: 40px; height: 40px; border-radius: 50%; border: none; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section" id="map-viewport">
        <div id="panzoom-element">
            <img src="Abraham_2.png" id="bg-map" alt="Base Map">
            <svg id="svg-layer"></svg>
            <div id="marker-layer"></div>
        </div>

        <div class="controls">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="pz.reset()">清空</button>
        </div>

        <div id="info-box">
            <div id="info-header">
                <span style="font-weight: bold; color: #666;">事件詳情 (可拖動)</span>
                <button onclick="document.getElementById('info-box').style.display='none'">✕</button>
            </div>
            <div id="info-body">
                <h3 id="info-title" style="margin-top:0; color:var(--gold);"></h3>
                <p><strong>地點定位：</strong> <span id="info-loc-tags"></span></p>
                <p><strong>經緯座標：</strong> <code id="info-coords">--</code></p>
                <p><strong>時間資訊：</strong> <span id="info-time"></span></p>
                <p><strong>引用經文：</strong> <i id="info-scripture"></i></p>
                <hr>
                <p id="info-note"></p>
            </div>
        </div>
    </div>

    <div id="table-section">
        <table id="main-table">
            <thead><tr><th width="60">序號</th><th>事件內容</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    let pz;
    let eventData = [], coordsData = {}, geoData = [];
    let currentMap = 'small';

    // 初始化 Panzoom
    const elem = document.getElementById('panzoom-element');
    pz = Panzoom(elem, { maxScale: 5, minScale: 0.5, canvas: true });
    elem.parentElement.addEventListener('wheel', pz.zoomWithWheel);

    // CSV 解析 (支援 UTF-8)
    function parseCSV(text) {
        const rows = [];
        let currentRow = [], currentCell = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { currentRow.push(currentCell.trim()); currentCell = ''; }
            else if (c === '\n' && !inQuotes) { currentRow.push(currentCell.trim()); rows.push(currentRow); currentRow = []; currentCell = ''; }
            else if (c !== '\r') currentCell += c;
        }
        if (currentCell) currentRow.push(currentCell.trim());
        if (currentRow.length) rows.push(currentRow);
        return rows;
    }

    // 拖動資訊框功能
    dragElement(document.getElementById("info-box"));

    function dragElement(elmnt) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = document.getElementById("info-header");
        header.onmousedown = (e) => {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            };
        };
    }

    async function init() {
        const [d, c, g] = await Promise.all([fetch('data.csv'), fetch('coords.csv'), fetch('geofeatures.csv')]);
        
        // 座標載入
        parseCSV(await c.text()).slice(1).forEach(r => {
            coordsData[r[0]] = { xs: r[1], ys: r[2], xl: r[3], yl: r[4], type: r[5], radius: r[6] };
        });

        // 地貌載入
        parseCSV(await g.text()).slice(1).forEach(r => {
            geoData.push({ name: r[0], type: r[1], xs: r[2], ys: r[3], xl: r[4], yl: r[5] });
        });

        // 主資料載入
        parseCSV(await d.text()).slice(1).forEach((r, i) => {
            if(!r[0]) return;
            eventData.push({ id: r[0], time: r[1], event: r[2], loc: r[3], script: r[4], note: r[5] });
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r[0]}</td><td>${r[2]}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            document.getElementById('table-body').appendChild(tr);
        });

        renderMap('small');
    }

    function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');

        const item = eventData[idx];
        const places = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());

        // 自動判斷是否需要大圖
        const needLarge = places.some(p => coordsData[p] && !coordsData[p].xs);
        const mapType = needLarge ? 'large' : 'small';

        if (currentMap !== mapType) {
            currentMap = mapType;
            const img = document.getElementById('bg-map');
            img.src = mapType === 'large' ? 'Abraham_1.png' : 'Abraham_2.png';
            img.onload = () => { renderMap(mapType, places); focusOnPlaces(places); };
        } else {
            renderMap(mapType, places);
            focusOnPlaces(places);
        }

        updateInfoBox(item, places);
    }

    function renderMap(type, actives = []) {
        const layer = document.getElementById('marker-layer');
        const svg = document.getElementById('svg-layer');
        layer.innerHTML = ''; svg.innerHTML = '';
        const X = type === 'large' ? 'xl' : 'xs';
        const Y = type === 'large' ? 'yl' : 'ys';

        // 繪製虛線路徑
        if (actives.length >= 2) {
            const p1 = coordsData[actives[0]], p2 = coordsData[actives[1]];
            if (p1 && p2 && p1[X] && p2[X]) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', p1[X]+'%'); line.setAttribute('y1', p1[Y]+'%');
                line.setAttribute('x2', p2[X]+'%'); line.setAttribute('y2', p2[Y]+'%');
                line.setAttribute('stroke', '#c5a059'); line.setAttribute('stroke-width', '3');
                line.setAttribute('stroke-dasharray', '8,5');
                svg.appendChild(line);
            }
        }

        // 繪製地點與標籤
        for (const name in coordsData) {
            const c = coordsData[name];
            if (!c[X] || !c[Y]) continue;
            const isAct = actives.includes(name);
            const div = document.createElement('div');
            div.className = `marker ${isAct ? 'active' : 'low-priority'}`;
            div.style.left = c[X] + '%'; div.style.top = c[Y] + '%';
            div.textContent = name;
            layer.appendChild(div);
        }
    }

    function focusOnPlaces(places) {
        const X = currentMap === 'large' ? 'xl' : 'xs';
        const Y = currentMap === 'large' ? 'yl' : 'ys';
        const p = coordsData[places[0]];
        if (p && p[X]) {
            const container = document.getElementById('map-section');
            const xPx = (p[X] / 100) * elem.offsetWidth;
            const yPx = (p[Y] / 100) * elem.offsetHeight;
            pz.zoom(1.5);
            setTimeout(() => {
                pz.pan(container.offsetWidth/2 - xPx*1.5, container.offsetHeight/2 - yPx*1.5);
            }, 100);
        }
    }

    function updateInfoBox(item, places) {
        const box = document.getElementById('info-box');
        box.style.display = 'block';
        document.getElementById('info-title').textContent = `${item.id}. ${item.event}`;
        document.getElementById('info-time').textContent = item.time;
        document.getElementById('info-scripture').textContent = item.script;
        document.getElementById('info-note').textContent = item.note;
        
        const tagContainer = document.getElementById('info-loc-tags');
        tagContainer.innerHTML = '';
        places.forEach(p => {
            const span = document.createElement('span');
            span.className = 'loc-tag';
            span.textContent = p;
            span.onclick = () => focusOnPlaces([p]);
            tagContainer.appendChild(span);
        });

        const p = coordsData[places[0]];
        document.getElementById('info-coords').textContent = p ? `X:${p[currentMap==='large'?'xl':'xs']}%, Y:${p[currentMap==='large'?'yl':'ys']}%` : 'N/A';
    }

    window.onload = init;
</script>

</body>
</html>
