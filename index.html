<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V11.0.2</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; 
            background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; 
        }
        
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; display: flex; align-items: center; justify-content: center; }
        #panzoom-element { display: inline-block; position: relative; cursor: grab; }
        #panzoom-element:active { cursor: grabbing; }
        #bg-map { display: block; max-width: none; user-select: none; -webkit-user-drag: none; }
        
        #overlay-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer; pointer-events: auto; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.6); border-radius: 50%; margin-bottom: 2px; }
        .marker .label { 
            padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); 
            border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; 
            color: var(--brown); transition: opacity 0.2s;
        }

        @keyframes breathing { 0% { box-shadow: 0 0 0px #d32f2f; transform: scale(1); } 50% { box-shadow: 0 0 15px #d32f2f; transform: scale(1.2); } 100% { box-shadow: 0 0 0px #d32f2f; transform: scale(1); } }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .marker.highlight { z-index: 1000 !important; }
        .marker.highlight .label { opacity: 1 !important; background: #fffde7 !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; animation: breathing 2s infinite ease-in-out; }
        .marker.highlight .dot { background: #d32f2f; animation: jump 1s infinite; }
        .marker.region-type .label { background: none !important; border: none !important; font-family: 'ZCOOL KuaiLe', cursive; color: var(--ink-blue); text-shadow: 0 0 5px #fdf6e3; font-size: 16px; }

        #resizer-main { width: 8px; background: var(--handle-bg); cursor: col-resize; z-index: 2100; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #resizer-main:hover { background: #ccc; }
        #resizer-main::after { content: "⋮"; color: #888; font-weight: bold; }

        #side-panel { width: 350px; min-width: 200px; background: white; display: flex; flex-direction: column; overflow: hidden; z-index: 1500; box-shadow: -2px 0 10px rgba(0,0,0,0.1); flex-shrink: 0; }
        #folder-nav { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #eee; }
        #folder-select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        
        #info-area { flex-shrink: 0; display: none; flex-direction: column; background: #fff; border-bottom: 1px solid #ddd; max-height: 60%; }
        #info-header { background: var(--dark); color: white; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; height: 44px; flex-shrink: 0; cursor: pointer; }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; }
        #resizer-inner { height: 8px; background: #f0f0f0; cursor: row-resize; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #resizer-inner::after { content: "⋯"; color: #aaa; font-size: 12px; line-height: 8px; }

        #list-container { flex: 1; overflow-y: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        tr { cursor: pointer; border-bottom: 1px solid #eee; transition: background 0.2s; }
        tr:hover { background: #fcf8f0; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
        td { padding: 12px 10px; font-size: 14px; line-height: 1.4; color: #444; word-wrap: break-word; }

        .search-container { position: absolute; right: 15px; top: 15px; z-index: 2000; display: flex; align-items: center; }
        .search-bar-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.85); backdrop-filter: blur(5px); padding: 4px 8px; border-radius: 20px; border: 1.5px solid var(--brown); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        #search-input { width: 0; opacity: 0; transition: all 0.3s ease; border: none; background: transparent; height: 28px; outline: none; font-size: 14px; padding: 0; }
        #search-input.open { width: 150px; opacity: 1; padding: 0 5px; }
        #search-clear { cursor: pointer; padding: 0 5px; color: #999; display: none; font-weight: bold; }
        
        .fab-container { position: absolute; left: 15px; bottom: 15px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .fab-btn { width: 44px; height: 44px; background: white; border-radius: 50%; border: 1.5px solid var(--brown); box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .fab-btn:active { transform: scale(0.9); }
        #fab-menu { display: none; flex-direction: column; gap: 10px; }

        @media (max-width: 800px) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; height: 40%; flex: none; }
            #resizer-main { width: 100% !important; height: 8px; cursor: row-resize; }
            #resizer-main::after { content: "⋯"; }
            .search-container { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <div id="search-clear" onclick="clearSearch()">×</div>
                <input type="text" id="search-input" placeholder="搜尋地點或事件..." oninput="handleSearch()">
                <div style="cursor:pointer; padding: 4px;" onclick="toggleSearch()">🔍</div>
            </div>
        </div>

        <div class="fab-container">
            <div id="fab-menu">
                <div class="fab-btn" title="重置視角" onclick="resetView()">🏠</div>
            </div>
            <div class="fab-btn" onclick="toggleFab()">⚙️</div>
        </div>

        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    
    <div id="resizer-main" onmousedown="initResizerMain(event)"></div>
    
    <div id="side-panel">
        <div id="folder-nav">
            <select id="folder-select" onchange="loadProject(this.value)"></select>
        </div>
        
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()">
                <div>📜 詳情 <span id="info-arrow">▼</span></div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <button onclick="navEvent(-1); event.stopPropagation();" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">◀</button>
                    <button onclick="navEvent(1); event.stopPropagation();" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">▶</button>
                </div>
            </div>
            <div id="info-body">
                <div id="info-time" style="color:#888; font-size:12px; margin-bottom:4px;"></div>
                <h3 id="info-title" style="color:var(--gold); margin:0 0 10px 0; font-size:18px;"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; font-weight:bold; font-size:14px; margin-bottom:10px; border-left:3px solid var(--gold);"></div>
                <p id="info-script" style="color:#2980b9; font-weight:bold; margin:0 0 10px 0; font-size:14px;"></p>
                <div id="info-note" style="font-size:14px; line-height:1.6; color:#555; white-space: pre-wrap;"></div>
            </div>
        </div>
        
        <div id="resizer-inner" onmousedown="initResizerInner(event)"></div>
        
        <div id="list-container">
            <table>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = [], currentFolder = '', currentMapIdx = -1, currentEventIdx = -1;

    // --- 手術刀：植入精確解析機制 ---
    function splitCSVLine(line) {
        const result = [];
        let cur = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i], next = line[i+1];
            if (char === '"' && inQuote && next === '"') { cur += '"'; i++; }
            else if (char === '"') inQuote = !inQuote;
            else if (char === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result;
    }

    async function loadProject(folder) {
        if (!folder) return;
        currentFolder = folder;
        localStorage.setItem('lastBibleFolder', folder);
        
        try {
            const dRes = await fetch(`${folder}/data.csv?t=${Date.now()}`);
            const dText = await dRes.text();
            // --- 手術刀：應用 splitCSVLine ---
            const rows = dText.split('\n').filter(l => l.trim()).map(line => splitCSVLine(line));
            const dataRows = rows.slice(1);
            
            eventData = dataRows.map(r => {
                const obj = { id: r[0], time: r[1], event: r[2], loc: r[3], script: r[4], note: r[5] };
                obj._searchStr = Object.values(obj).join('|').toLowerCase();
                return obj;
            });

            allCoords = [];
            for (let i = 1; i <= 15; i++) {
                try {
                    const cRes = await fetch(`${folder}/coords-${i}.csv?t=${Date.now()}`);
                    if (!cRes.ok) break;
                    const cText = await cRes.text();
                    // --- 手術刀：應用 splitCSVLine ---
                    const cRows = cText.split('\n').filter(l => l.trim()).map(line => splitCSVLine(line));
                    const header = cRows[0];
                    const sIdx = header.indexOf("Size"), nIdx = header.indexOf("地名"), xIdx = header.indexOf("百分比X"), yIdx = header.indexOf("百分比Y");
                    
                    cRows.slice(1).forEach(r => {
                        if(r[nIdx] && r[xIdx] && r[yIdx]) {
                            allCoords.push({ 
                                n: r[nIdx].replace(/^"|"$/g, '').trim(), 
                                x: r[xIdx], 
                                y: r[yIdx], 
                                mapIdx: i, 
                                size: parseInt(r[sIdx]) || 0 
                            });
                        }
                    });
                } catch(e) { break; }
            }
            
            handleSearch();
            if(filteredData.length > 0) selectEvent(0);
        } catch(e) { console.error("加載失敗", e); }
    }

    function selectEvent(idx, autoScroll = true) {
        if (idx < 0 || idx >= filteredData.length) return;
        currentEventIdx = idx;
        const rows = document.getElementById('table-body').rows;
        Array.from(rows).forEach((r, i) => r.className = i === idx ? 'active-row' : '');
        if (autoScroll) rows[idx]?.scrollIntoView({ block: 'nearest' });
        updateMapAndInfo(filteredData[idx]);
    }

    async function updateMapAndInfo(item) {
        const testNames = item.loc.split(/[+→]/).map(p => p.replace(/\(.*?\)/g, '').trim());
        let targetMapIdx = 1;
        for (let i = 15; i >= 1; i--) {
            const db = allCoords.filter(c => c.mapIdx === i);
            if (db.length > 0 && testNames.every(tn => findBestMatch(tn, db))) {
                targetMapIdx = i; break;
            }
        }

        if (currentMapIdx !== targetMapIdx) {
            currentMapIdx = targetMapIdx;
            const img = document.getElementById('bg-map');
            img.src = `${currentFolder}/picture-${targetMapIdx}.png`;
            await new Promise(res => img.onload = () => { syncOverlay(); updateMinScale(); res(); });
        }
        
        const currentMapData = allCoords.filter(c => c.mapIdx === targetMapIdx);
        const logic = parseLocationLogic(item.loc, currentMapData);
        renderVisuals(currentMapData, logic);
        updateInfoPanel(item);
    }

    function renderVisuals(db, logic) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        sl.innerHTML = '';
        
        logic.paths.forEach(path => {
            for (let i = 0; i < path.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', path[i].x + '%'); line.setAttribute('y1', path[i].y + '%');
                line.setAttribute('x2', path[i+1].x + '%'); line.setAttribute('y2', path[i+1].y + '%');
                line.setAttribute('stroke', '#d32f2f'); line.setAttribute('stroke-width', '2.5');
                line.setAttribute('stroke-dasharray', '5,5');
                sl.appendChild(line);
            }
        });

        const currentNames = db.map(d => d.n);
        Array.from(ml.querySelectorAll('.marker')).forEach(m => { if(!currentNames.includes(m.dataset.name)) m.remove(); });

        db.forEach(data => {
            const isHighlight = logic.points.some(p => p.n === data.n);
            let m = ml.querySelector(`.marker[data-name="${data.n}"]`);
            if (!m) {
                m = document.createElement('div'); m.className = 'marker'; m.dataset.name = data.n;
                m.innerHTML = `<div class="dot"></div><div class="label">${data.n}</div>`;
                m.onclick = (e) => { e.stopPropagation(); handleSearch(data.n); };
                ml.appendChild(m);
            }
            m.className = `marker ${isHighlight ? 'highlight' : ''} ${data.size > 2 ? 'region-type' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.dataset.size = data.size; // 用於排序
        });

        applyMarkerStyles();
        if (logic.points.length > 0) flyTo(logic.points);
        setTimeout(refreshCollision, 100);
    }

    function flyTo(pts) {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        let tx = 0, ty = 0;
        pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); });
        const px = (tx/pts.length/100)*img.offsetWidth, py = (ty/pts.length/100)*img.offsetHeight, sc = pz.getScale();
        // --- 手術刀：維持 V11.0.0 正確公式 ---
        pz.pan((c.clientWidth/2) - (px * sc), (c.clientHeight/2) - (py * sc), { animate: true });
    }

    function findBestMatch(t, db) {
        let best = null, minDiff = Infinity;
        for (const item of db) {
            if (item.n === t) return item;
            if (item.n.includes(t) || t.includes(item.n)) {
                let diff = Math.abs(item.n.length - t.length);
                if (diff < minDiff) { minDiff = diff; best = item; }
            }
        }
        return best;
    }

    function parseLocationLogic(locStr, db) {
        const res = { paths: [], points: [] };
        locStr.split('+').forEach(block => {
            if (block.includes('→')) {
                const chain = block.split('→').map(p => findBestMatch(p.replace(/\(.*?\)/g, '').trim(), db)).filter(p => p);
                if (chain.length > 1) res.paths.push(chain);
                chain.forEach(p => res.points.push(p));
            } else {
                const pt = findBestMatch(block.replace(/\(.*?\)/g, '').trim(), db);
                if (pt) res.points.push(pt);
            }
        });
        return res;
    }

    function handleSearch(manualTerm = null) {
        const input = document.getElementById('search-input');
        if (manualTerm !== null) { input.value = manualTerm; input.classList.add('open'); }
        const term = input.value.trim().toLowerCase();
        document.getElementById('search-clear').style.display = term ? 'block' : 'none';
        filteredData = term ? eventData.filter(item => item._searchStr.includes(term)) : [...eventData];
        renderTable(filteredData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = data.map((item, i) => `
            <tr onclick="selectEvent(${i})">
                <td width="50" style="text-align:center; color:#999;">${item.id}</td>
                <td>${item.event}</td>
            </tr>
        `).join('');
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
    }

    function toggleSearch() { const i = document.getElementById('search-input'); i.classList.toggle('open'); if(i.classList.contains('open')) i.focus(); }
    function clearSearch() { document.getElementById('search-input').value = ''; handleSearch(); }
    function toggleInfo() { const b = document.getElementById('info-body'), a = document.getElementById('info-arrow'); const open = b.style.display !== 'none'; b.style.display = open ? 'none' : 'block'; a.innerText = open ? '▲' : '▼'; }
    function navEvent(dir) { selectEvent(currentEventIdx + dir); }

    function initResizerMain(e) {
        const side = document.getElementById('side-panel');
        const startX = e.clientX, startW = side.offsetWidth;
        document.onmousemove = (ev) => { side.style.width = (startW + (startX - ev.clientX)) + 'px'; syncOverlay(); updateMinScale(); refreshCollision(); };
        document.onmouseup = () => document.onmousemove = null;
    }

    function initResizerInner(e) {
        const info = document.getElementById('info-area');
        const startY = e.clientY, startH = info.offsetHeight;
        document.onmousemove = (ev) => { info.style.height = (startH + (ev.clientY - startY)) + 'px'; };
        document.onmouseup = () => document.onmousemove = null;
    }

    function applyMarkerStyles() {
        if (!pz) return;
        const s = pz.getScale();
        document.querySelectorAll('.marker').forEach(m => {
            m.style.transform = `translate(-50%, -50%) scale(${s > 1 ? 1/s : 1})`;
        });
    }

    // --- 手術刀：植入 sorter.html 的排序權重邏輯 ---
    function refreshCollision() {
        const markers = Array.from(document.querySelectorAll('.marker')), occupied = [];
        const dText = eventData.map(d => d._searchStr).join(' ');

        markers.sort((a, b) => {
            const isHa = a.classList.contains('highlight'), isHb = b.classList.contains('highlight');
            if (isHa !== isHb) return isHa ? -1 : 1;
            
            const sA = parseInt(a.dataset.size) || 0, sB = parseInt(b.dataset.size) || 0;
            if (sA !== sB) return sA - sB; 
            
            const fA = dText.split(a.dataset.name).length - 1, fB = dText.split(b.dataset.name).length - 1;
            if (fA !== fB) return fB - fA;
            return 0;
        });

        markers.forEach(m => {
            const label = m.querySelector('.label');
            if (!label) return;
            const rect = label.getBoundingClientRect();
            const overlap = occupied.some(o => !(rect.right < o.left || rect.left > o.right || rect.bottom < o.top || rect.top > o.bottom));
            if (overlap && !m.classList.contains('highlight')) {
                label.style.opacity = "0"; label.style.pointerEvents = "none";
            } else {
                label.style.opacity = "1"; label.style.pointerEvents = "auto"; occupied.push(rect);
            }
        });
    }

    function updateMinScale() {
        const img = document.getElementById('bg-map'), c = document.getElementById('map-section');
        if(!img.offsetWidth) return;
        const min = Math.max(c.clientWidth / img.offsetWidth, c.clientHeight / img.offsetHeight);
        pz.setOptions({ minScale: min });
        if (pz.getScale() < min) pz.zoom(min, { animate: true });
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px';
    }

    function toggleFab() { const m = document.getElementById('fab-menu'); m.style.display = m.style.display === 'none' ? 'flex' : 'none'; }
    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        // --- 手術刀：維持 contain: 'outside' ---
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        
        const res = await fetch(`folder.csv?t=${Date.now()}`);
        const fText = await res.text();
        const folders = fText.split('\n').filter(l => l.trim()).map(line => splitCSVLine(line)).slice(1);
        
        const select = document.getElementById('folder-select');
        select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => { if(f[0]) { const opt = document.createElement('option'); opt.value = f[0]; opt.innerText = f[1] || f[0]; select.appendChild(opt); } });
        const last = localStorage.getItem('lastBibleFolder');
        if (last) { select.value = last; loadProject(last); }
    };
</script>
</body>
</html>
